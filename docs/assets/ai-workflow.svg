<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="930" viewBox="0 0 1460 930" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei','Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3 L0,6 z" fill="#455A64"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3 L0,6 z" fill="#E53935"/>
    </marker>
    <marker id="arrB" markerWidth="11" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3 L0,6 z" fill="#6D4C41"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1460" height="930" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="40" font-size="27" font-weight="700" fill="#263238">未來 AI 工作流</text>
  <text x="305" y="40" font-size="18" fill="#78909C">· AI-native SDLC pipeline</text>
  <text x="40" y="66" font-size="14" fill="#607D8B">Legacy 反推 → Bible → PRD → SRS → QA → RD-Agent ｜ 每個交接點 = 機器可驗證的契約</text>

  <!-- ===================== Row A : artifact pipeline ===================== -->
  <!-- b1 Legacy -->
  <rect x="40" y="100" width="212" height="92" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="146" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#37474F">Legacy 系統</text>
  <text x="146" y="163" text-anchor="middle" font-size="12" fill="#546E7A">既有碼 · DB · JSP</text>

  <!-- b2 Bible -->
  <rect x="327" y="100" width="212" height="92" rx="10" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
  <text x="433" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">Bible 業務聖經</text>
  <text x="433" y="153" text-anchor="middle" font-size="11.5" fill="#6D4C37">user story · 北極星</text>
  <text x="433" y="172" text-anchor="middle" font-size="11.5" fill="#6D4C37">黃金旅程</text>

  <!-- b3 PRD -->
  <rect x="614" y="100" width="212" height="92" rx="10" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="720" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#0D47A1">PRD</text>
  <text x="720" y="162" text-anchor="middle" font-size="12" fill="#1565C0">PM/PO — what</text>

  <!-- b4 SRS -->
  <rect x="901" y="100" width="212" height="92" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
  <text x="1007" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#004D40">SRS</text>
  <text x="1007" y="152" text-anchor="middle" font-size="11.5" fill="#00695C">OpenAPI · spec</text>
  <text x="1007" y="171" text-anchor="middle" font-size="11.5" fill="#00695C">DB schema</text>

  <!-- b5 QA -->
  <rect x="1188" y="100" width="212" height="92" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="1294" y="131" text-anchor="middle" font-size="15" font-weight="700" fill="#4A148C">QA cases 1~∞</text>
  <text x="1294" y="154" text-anchor="middle" font-size="11" fill="#6A1B9A">可跑驗收 · covers Rn</text>

  <!-- Row A arrows + labels -->
  <line x1="252" y1="146" x2="325" y2="146" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="288" y="138" text-anchor="middle" font-size="10.5" font-style="italic" fill="#546E7A">EPRO Expert AI</text>
  <line x1="539" y1="146" x2="612" y2="146" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="576" y="138" text-anchor="middle" font-size="10.5" font-style="italic" fill="#546E7A">PM/PO + AI</text>
  <line x1="826" y1="146" x2="899" y2="146" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="863" y="138" text-anchor="middle" font-size="10.5" font-style="italic" fill="#546E7A">SA + AI</text>
  <line x1="1113" y1="146" x2="1186" y2="146" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1150" y="138" text-anchor="middle" font-size="10.5" font-style="italic" fill="#546E7A">QA + AI</text>

  <!-- Traceability spine -->
  <line x1="333" y1="226" x2="1404" y2="226" stroke="#6D4C41" stroke-width="3" marker-end="url(#arrB)"/>
  <text x="868" y="217" text-anchor="middle" font-size="12" font-weight="700" fill="#6D4C41">追溯 ID 骨幹（funcId 例 EPROC00118）：串 Bible → PRD → SRS → QA → code / test</text>

  <!-- Rail : upstream SRS+QA feed into RD (input + boundary) -->
  <path d="M1294,192 L1294,300 L180,300 L180,438" fill="none" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="700" y="292" text-anchor="middle" font-size="11.5" fill="#455A64">上游 SRS + QA = RD 的輸入 + 驗收邊界</text>

  <!-- ===================== Row B : build + verify + feedback ===================== -->
  <!-- RD-Agent -->
  <rect x="60" y="440" width="240" height="120" rx="10" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
  <text x="180" y="482" text-anchor="middle" font-size="17" font-weight="700" fill="#1A237E">RD-Agent</text>
  <text x="180" y="507" text-anchor="middle" font-size="13" fill="#283593">開發 + 測試</text>
  <text x="180" y="528" text-anchor="middle" font-size="12" fill="#5C6BC0">Code → CICD</text>

  <!-- DoD gate wall -->
  <rect x="420" y="395" width="372" height="340" rx="12" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="606" y="423" text-anchor="middle" font-size="15" font-weight="700" fill="#C62828">DoD 閘門牆</text>
  <text x="606" y="441" text-anchor="middle" font-size="11" fill="#8D6E63">RD 通過 SA / QA 邊界的條件</text>
  <text x="440" y="471" font-size="13" fill="#333333">① Contract · OpenAPI snapshot</text>
  <text x="440" y="497" font-size="13" fill="#333333">② Schema · entity ↔ DB</text>
  <text x="440" y="523" font-size="13" fill="#333333">③ verify-c0 · 結構 / 只新增</text>
  <text x="440" y="549" font-size="13" fill="#333333">④ QA 驗收 · 跑 QA cases</text>
  <text x="440" y="575" font-size="13" fill="#333333">⑤ 覆蓋率 · ID 對表</text>
  <text x="440" y="601" font-size="13" fill="#333333">⑥ Build 綠</text>
  <line x1="440" y1="616" x2="772" y2="616" stroke="#EF9A9A" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="606" y="635" text-anchor="middle" font-size="10.5" font-style="italic" fill="#9E9E9E">── 以上 deterministic：機器說了算 ──</text>
  <text x="440" y="662" font-size="13" fill="#777777">⑦ LLM 語意審查 （advisory · 不當 gate）</text>
  <text x="440" y="704" font-size="10.5" fill="#B71C1C">①②③ ← SRS 定義　·　④⑤ ← QA 定義　·　⑥ build　·　⑦ 輔助</text>

  <!-- Done -->
  <rect x="900" y="455" width="150" height="92" rx="10" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="975" y="497" text-anchor="middle" font-size="16" font-weight="700" fill="#1B5E20">✅ Done</text>
  <text x="975" y="520" text-anchor="middle" font-size="12" fill="#2E7D32">①–⑥ 全綠</text>

  <!-- Issue -->
  <rect x="1190" y="455" width="212" height="92" rx="10" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="1296" y="492" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">Issue</text>
  <text x="1296" y="516" text-anchor="middle" font-size="12" fill="#8D6E63">bug → 回歸 case</text>

  <!-- Row B main arrows -->
  <line x1="300" y1="500" x2="418" y2="500" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="359" y="491" text-anchor="middle" font-size="10.5" fill="#546E7A">產出</text>
  <line x1="792" y1="500" x2="898" y2="500" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="845" y="491" text-anchor="middle" font-size="10.5" fill="#546E7A">全綠</text>
  <line x1="1050" y1="500" x2="1188" y2="500" stroke="#455A64" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1119" y="491" text-anchor="middle" font-size="10.5" fill="#546E7A">CICD</text>

  <!-- FAIL loop : wall -> RD -->
  <path d="M606,735 L606,768 L180,768 L180,562" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrR)"/>
  <text x="393" y="761" text-anchor="middle" font-size="11" fill="#E53935">❌ 任一 FAIL → 回 RD 修，重跑 ①–⑦</text>

  <!-- Regression loop : Issue -> QA -->
  <path d="M1340,455 L1340,210 L1296,210 L1296,194" fill="none" stroke="#8E24AA" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrR)"/>
  <text x="1332" y="330" text-anchor="end" font-size="11" fill="#8E24AA">↑ bug → 新 QA case（回歸 1~∞）</text>

  <!-- ===================== Principles legend ===================== -->
  <rect x="40" y="792" width="1380" height="118" rx="10" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.2"/>
  <text x="60" y="820" font-size="14" font-weight="700" fill="#37474F">原則 — 這條鏈成立的支點</text>
  <text x="60" y="846" font-size="13" fill="#333333">↑ 往上可追溯：每個 artifact 經 ID（funcId）追溯到上游 user story；漏接 / 覆蓋率可機器證明。</text>
  <text x="60" y="872" font-size="13" fill="#333333">↓ 往下可驗證：deterministic 閘門 ①–⑥ 可信、LLM ⑦ 只輔助（30% 補完經驗往上推；AI 各層都會 confabulate）。</text>
  <text x="60" y="898" font-size="13" fill="#333333">★ Bible 是敘事特例 → 證據接地：每條業務北極星 / user story 引用 legacy file:line，杜絕幻覺地基。</text>
</svg>

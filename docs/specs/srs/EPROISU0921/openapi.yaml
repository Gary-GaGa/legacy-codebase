openapi: 3.0.3
info:
  title: EPROISU0921 Data Input API
  version: 1.0.0-in-review
  description: In-review SRS contract for EPROISU0921. Per-page owner checkpoint is required before approval.
servers:
  - url: https://example.com
security:
  - sessionAuth: []
paths:
  /epl-sele-isu-data-input:
    post:
      operationId: eplSeleIsuDataInput
      summary: Select Data Input dropdown and address-version data
      tags: [EPROISU0921]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
      responses:
        '200':
          description: Success. Returns dropdowns, law firm list, address updDate, and province list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EproResponseBase'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: '#/components/schemas/SeleIsuDataInputResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/DataNotFound'
        '500':
          $ref: '#/components/responses/QueryFail'
  /epl-info-isu-data-input:
    post:
      operationId: eplInfoIsuDataInput
      summary: Query Data Input page state
      tags: [EPROISU0921]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
      responses:
        '200':
          description: Success. Returns Data Input main data, collateral lists, T24 check state, and completion flag.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EproResponseBase'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: '#/components/schemas/InfoIsuDataInputResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/DataNotFound'
        '500':
          $ref: '#/components/responses/QueryFail'
  /epl-case-isu-data-input-check-mb:
    post:
      operationId: eplCaseIsuDataInputCheckMb
      summary: Check main borrower T24/CIF/SSI information
      tags: [EPROISU0921]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckMbRequest'
      responses:
        '200':
          description: Success. mbCheck carries Y or N; resultMsg carries mismatch details when N.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EproResponseBase'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckMbResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '500':
          $ref: '#/components/responses/UpstreamFail'
  /epl-case-isu-data-input-check-co:
    post:
      operationId: eplCaseIsuDataInputCheckCo
      summary: Check co-borrower T24/CIF information
      tags: [EPROISU0921]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckCoRequest'
      responses:
        '200':
          description: Success. coCheck carries Y or N; resultList carries row-level status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EproResponseBase'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckCoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '500':
          $ref: '#/components/responses/UpstreamFail'
  /epl-save-isu-data-input:
    post:
      operationId: eplSaveIsuDataInput
      summary: Save draft or Finished Data Input transaction
      tags: [EPROISU0921]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveIsuDataInputRequest'
      responses:
        '200':
          description: Success. Draft saves with eprois0921=N; Finished saves with eprois0921=Y after BE validation.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EproResponseBase'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: '#/components/schemas/SaveIsuDataInputResponse'
        '400':
          $ref: '#/components/responses/SaveValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '500':
          $ref: '#/components/responses/SaveFail'
  /epl-retu-isu-data-input:
    post:
      operationId: eplRetuIsuDataInput
      summary: Return Data Input case to prior workflow state
      tags: [EPROISU0921]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
      responses:
        '200':
          description: Success. Case is returned, history is written, and confirmed temporary DB artifacts are cleaned atomically.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EproResponseBase'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: '#/components/schemas/ReturnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '500':
          $ref: '#/components/responses/ReturnFail'
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Platform-authenticated user context. Concrete token/session value is environment-owned and not specified by this SRS.
  responses:
    BadRequest:
      description: Client validation error such as COMMON_MSG_ERROR_LON, missing required field, or invalid workflow input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: UNAUTHENTICATED. The request has no valid authenticated user context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AccessDenied:
      description: ACCESS_DENIED. Authenticated user is not allowed by role/state service guard.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    DataNotFound:
      description: MSG_DATA_NOT_FOUND. Required application or prerequisite data is absent.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    QueryFail:
      description: MSG_QUERY_FAIL. Query or initialization failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamFail:
      description: MSG_QUERY_FAIL or upstream T24/CIF unavailable/timeout/error. Business mismatches use 200 with mbCheck/coCheck=N instead.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    SaveValidationError:
      description: "Validation or business-rule failure: COMMON_MSG_ERROR_LON, MSG_OVER_AMOUNT, EPROIS0923_BO_UNCHECK, EPROIS0923_COBO_UNCHECK, EPROISU0921_ADDRESS_LENGTH, EPROISU0921_REPAYMENT_DAY_INVALID, or EPROISU0921_LAW_FIRM_REMARK_REQUIRED."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    SaveFail:
      description: MSG_SAVE_FAIL. Save/Finished transaction failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ReturnFail:
      description: MSG_RETURN_FAIL. Return transaction failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    EproResponseBase:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: '0000'
        message:
          type: string
          example: Success
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - UNAUTHENTICATED
            - ACCESS_DENIED
            - COMMON_MSG_ERROR_LON
            - MSG_DATA_NOT_FOUND
            - MSG_QUERY_FAIL
            - MSG_SAVE_FAIL
            - MSG_RETURN_FAIL
            - MSG_OVER_AMOUNT
            - EPROIS0923_BO_UNCHECK
            - EPROIS0923_COBO_UNCHECK
            - EPROISU0921_ADDRESS_LENGTH
            - EPROISU0921_REPAYMENT_DAY_INVALID
            - EPROISU0921_LAW_FIRM_REMARK_REQUIRED
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            fieldErrors:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
    ApplicationRequest:
      type: object
      required: [applicationNo]
      properties:
        applicationNo:
          type: string
          maxLength: 30
    OptionItem:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
          maxLength: 200
        value:
          type: string
          maxLength: 50
    SeleIsuDataInputResponse:
      type: object
      required: [updDate, lawFirmList, provinceList]
      properties:
        updDate:
          type: string
          maxLength: 10
          description: Case application-date-derived address version, format yyyy-MM-dd.
        lawFirmList:
          type: array
          items:
            $ref: '#/components/schemas/OptionItem'
        provinceList:
          type: array
          items:
            $ref: '#/components/schemas/OptionItem'
        fieldOptions:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/OptionItem'
    InfoIsuDataInputResponse:
      type: object
      required: [applicationNo, eprois0921, mbCheck, coCheck, collList, purPropList, coBorList]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        caseProgress:
          type: string
          maxLength: 5
        borrowerT24No:
          type: string
          maxLength: 30
        borrowerName:
          type: string
          maxLength: 140
        groupBorrower:
          type: string
          maxLength: 20
        disbursementCurrency:
          type: string
          maxLength: 3
        disbursementAmount:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        drawdownAccount:
          type: string
          maxLength: 25
        desRepDay:
          type: integer
          minimum: 1
          maximum: 31
        lawFirmNo:
          type: string
          maxLength: 5
        lawFirmAmount:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount01:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount02:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount03:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount90:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirm90OtherRemark:
          type: string
          maxLength: 16
        cubcRelatedCifNo:
          type: string
          maxLength: 10
        eprois0921:
          type: string
          enum: ['Y', 'N', '']
          maxLength: 5
        mbCheck:
          type: string
          enum: ['Y', 'N', '']
          maxLength: 5
        coCheck:
          type: string
          enum: ['Y', 'N']
          maxLength: 5
          description: Normalized server result; no-co-borrower old baseline returns Y, not blank.
        updDate:
          type: string
          maxLength: 10
          description: Case application-date-derived address version, format yyyy-MM-dd.
        acctList:
          type: array
          items:
            $ref: '#/components/schemas/OptionItem'
        collList:
          type: array
          items:
            $ref: '#/components/schemas/CollateralItem'
        purPropList:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/PurchasedPropertyItem'
        coBorList:
          type: array
          items:
            $ref: '#/components/schemas/CoBorrowerInput'
    CheckMbRequest:
      type: object
      required: [applicationNo, borrowerT24No]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        borrowerT24No:
          type: string
          maxLength: 30
    CheckMbResponse:
      type: object
      required: [mbCheck, resultMsg, acctList]
      properties:
        mbCheck:
          type: string
          enum: ['Y', 'N']
          maxLength: 5
        resultMsg:
          type: array
          items:
            type: string
        acctList:
          type: array
          items:
            $ref: '#/components/schemas/OptionItem'
    CheckCoRequest:
      type: object
      required: [applicationNo, coBorList]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        coBorList:
          type: array
          items:
            $ref: '#/components/schemas/CoBorrowerCheckInput'
    CheckCoResponse:
      type: object
      required: [coCheck, resultList]
      properties:
        coCheck:
          type: string
          enum: ['Y', 'N']
          maxLength: 5
        resultList:
          type: array
          items:
            $ref: '#/components/schemas/CoBorrowerCheckResult'
    SaveIsuDataInputRequest:
      type: object
      required: [applicationNo, isFinish, dataInput, collList, purPropList]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isFinish:
          type: string
          enum: ['Y', 'N']
          maxLength: 1
        coCheck:
          type: string
          enum: ['Y', 'N', '']
          maxLength: 5
          description: Compatibility input; backend must verify current stored check state.
        dataInput:
          $ref: '#/components/schemas/DataInputMain'
        collList:
          type: array
          items:
            $ref: '#/components/schemas/CollateralItem'
        purPropList:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/PurchasedPropertyItem'
        coBorList:
          type: array
          items:
            $ref: '#/components/schemas/CoBorrowerInput'
    SaveIsuDataInputResponse:
      type: object
      required: [eprois0921]
      properties:
        eprois0921:
          type: string
          enum: ['Y', 'N']
          maxLength: 5
    ReturnResponse:
      type: object
      required: [returned]
      properties:
        returned:
          type: boolean
    DataInputMain:
      type: object
      properties:
        groupBorrower:
          type: string
          maxLength: 20
        borrowerT24No:
          type: string
          maxLength: 30
        cbcMember:
          type: string
          maxLength: 30
          description: Slot 1 of up to 5 CBC Member Reference values; same limit value as purchased-property rows but counted independently.
        cbcMember1:
          type: string
          maxLength: 5
          description: Slot 2 of up to 5 CBC Member Reference values.
        cbcMember2:
          type: string
          maxLength: 5
          description: Slot 3 of up to 5 CBC Member Reference values.
        cbcMember3:
          type: string
          maxLength: 5
          description: Slot 4 of up to 5 CBC Member Reference values.
        cbcMember4:
          type: string
          maxLength: 5
          description: Slot 5 of up to 5 CBC Member Reference values.
        cbcSpecial:
          type: string
          maxLength: 5
        disbursementCurrency:
          type: string
          maxLength: 3
        disbursementAmount:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        desRepDay:
          type: integer
          minimum: 1
          maximum: 31
        drawdownAccount:
          type: string
          maxLength: 25
        disbursementBy:
          type: string
          maxLength: 25
        lawFirmNo:
          type: string
          maxLength: 5
        lawFirmAmount:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount01:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount02:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount03:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirmAmount90:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        lawFirm90OtherRemark:
          type: string
          maxLength: 16
        cubcRelatedCifNo:
          type: string
          maxLength: 10
    CollateralItem:
      type: object
      required: [collDataSeq]
      properties:
        collDataSeq:
          type: integer
          minimum: 1
          maximum: 999
        propertyColl:
          type: string
          maxLength: 1
        collProvinceCode:
          type: string
          maxLength: 5
        collDistrictCode:
          type: string
          maxLength: 5
        collCommuneCode:
          type: string
          maxLength: 8
        collVillageCode:
          type: string
          maxLength: 8
        collAddrRs:
          type: string
          maxLength: 210
        collAddrLast:
          type: string
          maxLength: 210
        purProType:
          type: string
          maxLength: 5
        estCom:
          type: string
          maxLength: 7
          pattern: '^(0[1-9]|1[0-2])/[0-9]{4}$'
          nullable: true
        titlePurcPro:
          type: string
          maxLength: 5
        purOfLoanNbc:
          type: string
          maxLength: 5
        purOfLoanNbcOther:
          type: string
          maxLength: 210
        estComType:
          type: string
          maxLength: 7
        priceProperty:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        priceLand:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        sugVal:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        builtWidth:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        buildArea:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        landArea:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        builtFloor:
          type: string
          maxLength: 5
        builtBedroom:
          type: string
          maxLength: 5
    PurchasedPropertyItem:
      type: object
      required: [otherCollDataSeq]
      properties:
        otherCollDataSeq:
          type: integer
          minimum: 1
          maximum: 999
        otrCollProvinceCode:
          type: string
          maxLength: 5
        otrCollDistrictCode:
          type: string
          maxLength: 5
        otrCollCommuneCode:
          type: string
          maxLength: 8
        otrCollVillageCode:
          type: string
          maxLength: 8
        otrCollAddrRs:
          type: string
          maxLength: 210
        otrCollAddrLast:
          type: string
          maxLength: 210
        otrPurProType:
          type: string
          maxLength: 5
        otrEstCom:
          type: string
          maxLength: 7
          pattern: '^(0[1-9]|1[0-2])/[0-9]{4}$'
          nullable: true
        otrTitlePurcPro:
          type: string
          maxLength: 5
        otrPurOfLoanNbc:
          type: string
          maxLength: 5
        otrPurOfLoanNbcOther:
          type: string
          maxLength: 210
        otrEstComType:
          type: string
          maxLength: 7
        otrPriceProperty:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        otrPriceLand:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        otrSugVal:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        otrBuiltWidth:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        otrBuildArea:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        otrLandArea:
          type: string
          pattern: '^-?[0-9]{1,15}(\\.[0-9]{1,2})?$'
        otrBuiltFloor:
          type: string
          maxLength: 5
        otrBuiltBedroom:
          type: string
          maxLength: 5
    CoBorrowerInput:
      type: object
      required: [dataSeq]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        dataSeq:
          type: integer
          minimum: 1
          maximum: 99
        recid:
          type: string
          maxLength: 10
        checkSuccess:
          type: string
          maxLength: 5
    CoBorrowerCheckInput:
      type: object
      required: [dataSeq, recid]
      properties:
        dataSeq:
          type: integer
          minimum: 1
          maximum: 99
        recid:
          type: string
          maxLength: 10
    CoBorrowerCheckResult:
      type: object
      properties:
        dataSeq:
          type: integer
          minimum: 1
          maximum: 99
        recid:
          type: string
          maxLength: 10
        status:
          type: string
          enum: ['Y', 'N']
          maxLength: 5
        resultMsg:
          type: array
          items:
            type: string

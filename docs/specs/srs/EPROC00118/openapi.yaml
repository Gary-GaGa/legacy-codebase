openapi: 3.0.3
info:
  title: EPROC00118 Corporate Scorecard
  version: 0.1.0-draft
  description: >
    SRS contract for EPROC00118. Pending decisions are listed in spec.md.
    Error code names keep legacy/refactor trace: COMMON_MSG_ERROR_LON,
    MSG_DATA_NOT_FOUND, MSG_OVER_COUNT_LIMIT, MSG_QUERY_FAIL,
    COMMON_MSG_RATE_FAIL, EPROI00118_MSG_ERROR_FLG,
    COMMON_MSG_SAVE_SUCCESS, COMMON_MSG_SAVE_FAIL, E102, E130, E998, E999.
paths:
  /epl-sele-c0-corporateScorecard-list:
    post:
      summary: 取得 Corporate Scorecard 下拉選單與參數 options
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeleRequest'
      responses:
        '200':
          description: OK / 0000 / Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeleResponse'
        default:
          description: >
            Error response. Carries COMMON_MSG_ERROR_LON / E102 when applicationNo is blank,
            E998 for authentication/authorization failure, or MSG_QUERY_FAIL / E999 for
            platform/system failure. HTTP status mapping is owned by platform exception
            handling and is not finalized in this SRS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-info-c0-corporateScorecard:
    post:
      summary: 查詢 Corporate Scorecard 頁籤資料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoRequest'
      responses:
        '200':
          description: OK / 0000 / Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
        default:
          description: >
            Error response. Carries COMMON_MSG_ERROR_LON / E102 for missing request fields,
            MSG_DATA_NOT_FOUND for no case data, MSG_OVER_COUNT_LIMIT for platform count
            limits, E998 for authentication/authorization failure, or MSG_QUERY_FAIL / E999
            for platform/system failure. HTTP status mapping is owned by platform exception
            handling and is not finalized in this SRS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-calc-c0-corporateScorecard:
    post:
      summary: 計算 Corporate Scorecard risk level and score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalcRequest'
      responses:
        '200':
          description: OK / 0000 / Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalcResponse'
        default:
          description: >
            Error response. Carries E102 for missing required fields, E130 for invalid
            numeric format, E998 for authentication/authorization failure, or
            COMMON_MSG_RATE_FAIL / MSG_QUERY_FAIL / E999 for calculation/platform failure.
            HTTP status mapping is owned by platform exception handling and is not
            finalized in this SRS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-save-c0-corporateScorecard:
    post:
      summary: 儲存或完成 Corporate Scorecard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: COMMON_MSG_SAVE_SUCCESS / 0000 / Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        default:
          description: >
            Error response. Carries COMMON_MSG_ERROR_LON, EPROI00118_MSG_ERROR_FLG,
            COMMON_MSG_RATE, E102, E130, E998, COMMON_MSG_SAVE_FAIL, or E999. Save/Finished
            errors must leave TB_CORP_SCRCARD, TB_LON_SUMMARY_INFO, and checkpoint changes
            rolled back. HTTP status mapping is owned by platform exception handling and is
            not finalized in this SRS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Legacy/refactor error code name or platform error code.
        message:
          type: string
          description: User-facing or platform-localized error message.
        data:
          type: object
          nullable: true
    SeleRequest:
      type: object
      required: [applicationNo]
      properties:
        applicationNo:
          type: string
          maxLength: 30
    SeleResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/ScorecardOptionMap'
    ScorecardOptionMap:
      type: object
      description: >
        Option lists sourced from TB_SCORE_CARD_PARAM_DETAIL by application date.
        Includes B_V1 through B_V22 scorecard variables and COR_RISK_LV risk levels.
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/ValueLabelOption'
    ValueLabelOption:
      type: object
      properties:
        value:
          type: string
          maxLength: 3
        label:
          type: string
          maxLength: 100
        score:
          type: string
          maxLength: 10
    InfoRequest:
      type: object
      required: [applicationNo, isQuery]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isQuery:
          type: boolean
          description: true means read-only query mode
    InfoResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/ScorecardInfo'
    ScorecardInfo:
      type: object
      properties:
        applicationNo:
          type: string
          maxLength: 30
        applicationDate:
          type: string
          description: DD/MM/YYYY from TB_LON_SUMMARY_INFO.APPLICATION_DATE
        borrowerName:
          type: string
        commentDate:
          type: string
          maxLength: 50
        comment:
          type: string
          maxLength: 3000
        aoRiskLevelMap:
          $ref: '#/components/schemas/RiskLevelMap'
        crRiskLevelMap:
          $ref: '#/components/schemas/RiskLevelMap'
        checkPoint:
          type: string
          enum: [Y, N]
          description: Save未完成=Y, Finished完成=N
    CalcRequest:
      type: object
      required: [applicationNo, codeMap]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        codeMap:
          $ref: '#/components/schemas/CalcCodeMap'
    CalcResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/CalcResult'
    SaveRequest:
      type: object
      required: [applicationNo, isFinish, aoRiskLevelMap, crRiskLevelMap]
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isFinish:
          type: boolean
          description: false=Save, true=Finished
        comment:
          type: string
          maxLength: 3000
          description: Required for CR role 102/103 when isFinish=true
        aoRiskLevelMap:
          $ref: '#/components/schemas/RiskLevelMap'
        crRiskLevelMap:
          $ref: '#/components/schemas/RiskLevelMap'
    SaveResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: object
          properties:
            isAllTabsCheck:
              type: boolean
              description: Parent page done indicator after checkpoint aggregation
    RiskLevelMap:
      type: object
      properties:
        loanDefDayFlag:
          type: string
          maxLength: 2
          enum: [Y, N]
        ageCode: { type: string, maxLength: 2 }
        guarAgeCode: { type: string, maxLength: 2 }
        companyTypeCode: { type: string, maxLength: 2 }
        industryCode: { type: string, maxLength: 2 }
        yearOpCode: { type: string, maxLength: 2 }
        loanPurposeCode: { type: string, maxLength: 2 }
        repaymentStatusCode: { type: string, maxLength: 2 }
        kScoreCode: { type: string, maxLength: 2 }
        maxOverdueCode: { type: string, maxLength: 2 }
        trans12MonCode: { type: string, maxLength: 2 }
        subsRepaymentStatusCode: { type: string, maxLength: 2 }
        compPositiveCode: { type: string, maxLength: 2 }
        growthRatioCode: { type: string, maxLength: 2 }
        pmGrowthRatioCode: { type: string, maxLength: 2 }
        curRatio:
          type: string
          maxLength: 3
          pattern: '^[0-9]{1,3}$'
          description: UI percent integer 0-999, saved as database ratio by dividing by 100; reject overflow, no truncation
        deRatio:
          type: string
          maxLength: 10
          pattern: '^[0-9]{1,7}(\.[0-9]{1,2})?$'
          description: NUMBER(9,2); reject overflow or scale > 2, no truncation or rounding
        apCode: { type: string, maxLength: 2 }
        arCode: { type: string, maxLength: 2 }
        inventoryCode: { type: string, maxLength: 2 }
        totalAsset:
          type: string
          maxLength: 20
          pattern: '^[0-9]{1,17}(\.[0-9]{1,2})?$'
          description: NUMBER(19,2); reject overflow or scale > 2, no truncation or rounding
        totalLoanAmt:
          type: string
          maxLength: 20
          pattern: '^[0-9]{1,17}(\.[0-9]{1,2})?$'
          description: NUMBER(19,2); reject overflow or scale > 2, no truncation or rounding
        debtRatio:
          type: string
          maxLength: 7
          pattern: '^[0-9]{1,4}(\.[0-9]{1,2})?$'
          description: NUMBER(6,2); reject overflow or scale > 2, no truncation or rounding
        actionDate:
          type: string
          maxLength: 26
        riskLevel:
          type: string
          maxLength: 7
        totalScore:
          type: string
          maxLength: 7
    CalcCodeMap:
      allOf:
        - $ref: '#/components/schemas/RiskLevelMap'
      description: Same 22 score inputs without comment/actionDate requirements
    CalcResult:
      type: object
      properties:
        riskLevel:
          type: string
          maxLength: 7
        totalScore:
          type: string
          maxLength: 7
        scoreDatetime:
          type: string
          maxLength: 19
        ageScore: { type: string, maxLength: 3 }
        guarAgeScore: { type: string, maxLength: 3 }
        compTypeScore: { type: string, maxLength: 3 }
        industryScore: { type: string, maxLength: 3 }
        yearOpScore: { type: string, maxLength: 3 }
        loanPurposeScore: { type: string, maxLength: 3 }
        repaymentSScore: { type: string, maxLength: 3 }
        kScoreScore: { type: string, maxLength: 3 }
        maxOverdueScore: { type: string, maxLength: 3 }
        trans12monScore: { type: string, maxLength: 3 }
        subsRepaymentSScore: { type: string, maxLength: 3 }
        compPositiveScore: { type: string, maxLength: 3 }
        growthRatioScore: { type: string, maxLength: 3 }
        pmGrowthRatioScore: { type: string, maxLength: 3 }
        apScore: { type: string, maxLength: 3 }
        arScore: { type: string, maxLength: 3 }
        inventoryScore: { type: string, maxLength: 3 }
        curRatioCode: { type: string, maxLength: 3 }
        curRatioScore: { type: string, maxLength: 3 }
        deRatioCode: { type: string, maxLength: 3 }
        deRatioScore: { type: string, maxLength: 3 }
        cmpTotAssetCode: { type: string, maxLength: 3 }
        cmpTotAssetScore: { type: string, maxLength: 3 }
        totalLoanAmtCode: { type: string, maxLength: 3 }
        totalLoanAmtScore: { type: string, maxLength: 3 }
        debtRatioCode: { type: string, maxLength: 3 }
        debtRatioScore: { type: string, maxLength: 3 }

openapi: 3.0.3
info:
  title: EPROC00115 Borrower Group Exposure API
  version: 0.1.0
  description: SRS contract for EPROC00115. Status is authoritative in spec.md.
paths:
  /epl-sele-c0-borrower-group-exposure:
    post:
      operationId: eplSeleC0BorrowerGroupExposure
      summary: Query Borrower Group Exposure option lists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns option lists; business errors such as E102 or MSG_QUERY_FAIL return ErrorResponse in the same envelope.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SelectResponse'
                  - $ref: '#/components/schemas/BusinessErrorResponse'
        '401':
          description: E405 access denied or E498 invalid auth/session context from platform API authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /epl-info-c0-borrower-group-exposure:
    post:
      operationId: eplInfoC0BorrowerGroupExposure
      summary: Query Borrower Group Exposure details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns detail data; empty exposure rows return facility="" and facilitiesList=[]. Business errors such as E102, E126, E130, E201, E999, MSG_DATA_NOT_FOUND, MSG_OVER_COUNT_LIMIT, or MSG_QUERY_FAIL return ErrorResponse in the same envelope.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InfoResponse'
                  - $ref: '#/components/schemas/BusinessErrorResponse'
        '401':
          description: E405 access denied or E498 invalid auth/session context from platform API authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
  /epl-save-c0-borrower-group-exposure:
    post:
      operationId: eplSaveC0BorrowerGroupExposure
      summary: Save or finish Borrower Group Exposure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns code=0000, message=Success, empty data (legacy COMMON_MSG_SAVE_SUCCESS is a UI message, not an API body per R9); business errors such as E102, E126, E130, E201, E999, COMMON_MSG_SAVE_FAIL, or MSG_QUERY_FAIL return ErrorResponse in the same envelope.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SaveResponse'
                  - $ref: '#/components/schemas/BusinessErrorResponse'
        '401':
          description: E405 access denied from platform or backend case/edit authorization, or E498 invalid auth/session context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
components:
  schemas:
    SelectRequest:
      type: object
      required:
        - langType
      properties:
        langType:
          type: string
          maxLength: 10
    SelectResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          example: '0000'
        message:
          type: string
          example: Success
        data:
          $ref: '#/components/schemas/SelectData'
    SelectData:
      type: object
      required:
        - facilityList
        - loanLimitTypeList
        - ccyList
        - titleDeedTypeList
      properties:
        facilityList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        loanLimitTypeList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        ccyList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        titleDeedTypeList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
    InfoRequest:
      type: object
      required:
        - applicationNo
        - isQuery
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isQuery:
          type: boolean
    InfoResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          example: '0000'
        message:
          type: string
          example: Success
        data:
          $ref: '#/components/schemas/InfoData'
    InfoData:
      type: object
      required:
        - facility
        - facilitiesList
      properties:
        facility:
          type: string
          maxLength: 2
        facilitiesList:
          type: array
          items:
            $ref: '#/components/schemas/FacilityRow'
    SaveRequest:
      type: object
      required:
        - applicationNo
        - isFinish
        - facility
        - facilitiesList
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isFinish:
          type: boolean
        facility:
          type: string
          maxLength: 2
        facilitiesList:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FacilityRow'
    SaveResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          example: '0000'
        message:
          type: string
          example: Success
        data:
          type: object
          additionalProperties: true
          description: Current service returns an empty map on successful save.
    FacilityRow:
      type: object
      properties:
        borrowerGroupName:
          type: string
          maxLength: 50
        loanLimitType:
          type: string
          maxLength: 2
          description: Finished requires the Outstanding/Maturity branch when loanLimitType is not "2".
        lccAmountCur:
          type: string
          maxLength: 3
        lccAmount:
          type: string
          pattern: '^[0-9]{1,15}(\\.[0-9]{1,2})?$'
          description: Backend/DB contract is 15 integer digits plus 2 decimals; current FE integerMaxlength=12 gap is tracked in spec.md R21.
        outstandAmountCur:
          type: string
          maxLength: 3
        outstandAmount:
          type: string
          pattern: '^[0-9]{1,15}(\\.[0-9]{1,2})?$'
          description: Backend/DB contract is 15 integer digits plus 2 decimals; current FE integerMaxlength=12 gap is tracked in spec.md R21.
        collateralCur:
          type: string
          maxLength: 3
        collateralAmount:
          type: string
          pattern: '^[0-9]{1,15}(\\.[0-9]{1,2})?$'
          description: Backend/DB contract is 15 integer digits plus 2 decimals; current FE integerMaxlength=12 gap is tracked in spec.md R21.
        titleDeedType:
          type: string
          maxLength: 2
        interestRate:
          type: string
          pattern: '^[0-9]{1,15}(\\.[0-9]{1,2})?$'
          description: Backend/DB contract is 15 integer digits plus 2 decimals; current FE integerMaxlength=12 gap is tracked in spec.md R21.
        tenor:
          type: integer
          minimum: 0
          maximum: 99999
        maturityDate:
          type: string
          maxLength: 10
          pattern: '^[0-9]{2}/[0-9]{2}/[0-9]{4}$'
        ltv:
          type: string
          pattern: '^[0-9]{1,15}(\\.[0-9]{1,2})?$'
          description: Backend/DB contract is 15 integer digits plus 2 decimals; current FE integerMaxlength=12 gap is tracked in spec.md R21.
    ValueLabel:
      type: object
      required:
        - value
        - label
      properties:
        value:
          type: string
          maxLength: 50
        label:
          type: string
          maxLength: 200
    BusinessErrorResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          enum:
            - E102
            - E126
            - E130
            - E201
            - E999
            - MSG_DATA_NOT_FOUND
            - MSG_OVER_COUNT_LIMIT
            - MSG_QUERY_FAIL
            - COMMON_MSG_ERROR_LON
            - COMMON_MSG_SAVE_FAIL
        message:
          type: string
        data:
          type: object
          nullable: true
          additionalProperties: true
    AuthErrorResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          enum:
            - E405
            - E498
        message:
          type: string
        data:
          type: object
          nullable: true
          additionalProperties: true

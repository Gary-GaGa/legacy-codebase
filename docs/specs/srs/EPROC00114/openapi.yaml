openapi: 3.0.3
info:
  title: EPROC00114 Collateral Assessment API
  version: 0.1.0
  description: Draft SRS contract for EPROC00114 using current/refactor epl-* endpoints.
servers:
  - url: /
paths:
  /epl-sele-c0-collateral-assessment:
    post:
      operationId: selectCollateralAssessmentOptions
      summary: Load collateral assessment option lists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRequest'
      responses:
        '200':
          description: 0000 option lists loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelectResponse'
        '400':
          description: E102 validation failure or COMMON_MSG_ERROR_LON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: E498 authorization failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: MSG_OVER_COUNT_LIMIT query limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL unexpected option query failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-info-c0-collateral-assessment:
    post:
      operationId: getCollateralAssessmentInfo
      summary: Query collateral assessment data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoRequest'
      responses:
        '200':
          description: 0000 collateral assessment data loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
        '400':
          description: E102 validation failure or COMMON_MSG_ERROR_LON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: E498 authorization failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: MSG_DATA_NOT_FOUND no application data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: MSG_OVER_COUNT_LIMIT query limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL unexpected query failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-save-c0-collateral-assessment:
    post:
      operationId: saveCollateralAssessment
      summary: Save or finish collateral assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: 0000 and COMMON_MSG_SAVE_SUCCESS save completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '400':
          description: E102 validation failure or COMMON_MSG_ERROR_LON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: E498 authorization failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: MSG_DATA_NOT_FOUND no application data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL unexpected save failure or COMMON_MSG_RATE_FAIL score phase failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          maxLength: 64
          example: MSG_QUERY_FAIL
        message:
          type: string
          maxLength: 300
      additionalProperties: false
    SelectRequest:
      type: object
      required:
        - applicationNo
        - langType
      properties:
        applicationNo:
          type: string
          maxLength: 30
        langType:
          type: string
          maxLength: 10
          description: Required locale/language selector carried by current C0 DTO and refactor select artifact.
      additionalProperties: false
    SelectResponse:
      type: object
      required:
        - code
        - districtList
        - documentList
        - areaList
        - classificationList
        - loathsomeList
        - landShapeList
        - incomeList
        - addressList
      properties:
        code:
          type: string
          maxLength: 4
          example: '0000'
        districtList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        documentList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        areaList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        classificationList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        loathsomeList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        landShapeList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        incomeList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
        addressList:
          type: array
          items:
            $ref: '#/components/schemas/ValueLabel'
      additionalProperties: false
    ValueLabel:
      type: object
      required:
        - value
        - label
      properties:
        value:
          type: string
          maxLength: 8
        label:
          type: string
          maxLength: 180
      additionalProperties: false
    InfoRequest:
      type: object
      required:
        - applicationNo
        - isQuery
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isQuery:
          type: boolean
      additionalProperties: false
    InfoResponse:
      type: object
      required:
        - code
        - applicationNo
        - assistMap
        - reviewerMap
      properties:
        code:
          type: string
          maxLength: 4
          example: '0000'
        applicationNo:
          type: string
          maxLength: 30
        mainBorrowerName:
          type: string
          maxLength: 100
        applicationDate:
          type: string
          format: date-time
        checkpointStatus:
          type: string
          maxLength: 2
        reviewComment:
          type: string
          maxLength: 3000
        reviewCommentDate:
          type: string
          maxLength: 20
        assistMap:
          $ref: '#/components/schemas/AssessmentViewMap'
        reviewerMap:
          $ref: '#/components/schemas/AssessmentViewMap'
      additionalProperties: false
    SaveRequest:
      type: object
      required:
        - applicationNo
        - isFinish
        - assistMap
        - reviewerMap
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isFinish:
          type: boolean
        reviewComment:
          type: string
          maxLength: 3000
          description: CR-only review comment. AO roles 001/002 must not write this field; SRS R10 requires BE to reject or ignore AO tamper attempts before mutation.
        assistMap:
          $ref: '#/components/schemas/AssessmentInputMap'
        reviewerMap:
          $ref: '#/components/schemas/AssessmentInputMap'
      additionalProperties: false
    SaveResponse:
      type: object
      required:
        - code
        - message
        - isAllTabsCheck
        - rateResult
      properties:
        code:
          type: string
          maxLength: 4
          example: '0000'
        message:
          type: string
          maxLength: 100
          example: COMMON_MSG_SAVE_SUCCESS
        isAllTabsCheck:
          type: boolean
        rateResult:
          $ref: '#/components/schemas/RateResult'
      additionalProperties: false
    RateResult:
      type: object
      description: BE-derived Rate result for the acting AO/CR side. Preserves the legacy observable `level`, `scrDate`, and `totalScore` outcome without exposing a standalone calc endpoint.
      required:
        - riskLevel
        - scoreDatetime
        - totalScore
      properties:
        riskLevel:
          type: string
          maxLength: 7
          description: Legacy `level`; derived from `TB_SCORE_CARD_PARAM_DETAIL.COL_RISK_LV`.
        scoreDatetime:
          type: string
          maxLength: 20
          description: Legacy `scrDate`, formatted for page display and persistence.
        totalScore:
          type: string
          maxLength: 20
          pattern: '^-?\d{1,5}(\.\d{1,2})?$'
          description: Decimal score string preserving precision before persistence to NUMBER(7,2).
      additionalProperties: false
    AssessmentViewMap:
      type: object
      description: Read-side collateral assessment values. `riskLevel` and `actionDate` are BE-derived values.
      properties:
        riskLevel:
          type: string
          maxLength: 7
        actionDate:
          type: string
          maxLength: 20
        districtCode:
          type: string
          maxLength: 5
        classificationCode:
          type: string
          maxLength: 3
        incomeCode:
          type: string
          maxLength: 3
        addressCode:
          type: string
          maxLength: 3
        areaCode:
          type: string
          maxLength: 3
        loathsomeCode:
          type: string
          maxLength: 3
        landShapeCode:
          type: string
          maxLength: 3
        documentCode:
          type: string
          maxLength: 3
      additionalProperties: false
    AssessmentInputMap:
      type: object
      description: Save-side collateral code selections. BE-derived fields such as `riskLevel`, `actionDate`, total score, item scores, and score datetime are not accepted from the client and are generated by the save-path score phase.
      properties:
        districtCode:
          type: string
          maxLength: 5
        classificationCode:
          type: string
          maxLength: 3
        incomeCode:
          type: string
          maxLength: 3
        addressCode:
          type: string
          maxLength: 3
        areaCode:
          type: string
          maxLength: 3
        loathsomeCode:
          type: string
          maxLength: 3
        landShapeCode:
          type: string
          maxLength: 3
        documentCode:
          type: string
          maxLength: 3
      additionalProperties: false

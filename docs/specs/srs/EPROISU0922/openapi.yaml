openapi: 3.0.3
info:
  title: EPROISU0922 Individual Summary SRS Contract
  version: 1.0.0
servers:
  - url: https://example.com
paths:
  /epl-info-isu-summary:
    post:
      operationId: eplInfoIsuSummary
      summary: Query Individual Summary information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: Summary information returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryInfoResponse'
        '400':
          description: COMMON_MSG_ERROR_LON validation failure
        '404':
          description: MSG_DATA_NOT_FOUND
        '500':
          description: MSG_QUERY_FAIL
  /epl-case-isu-summary-submit:
    post:
      operationId: eplCaseIsuSummarySubmit
      summary: Submit Summary from CAD Maker to CAD Checker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitSummaryRequest'
      responses:
        '200':
          description: Submit success; summary/history and notification task are persisted atomically, with checker and effective proxy recipients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: COMMON_MSG_ERROR_LON, EPROIS0922_CLICK_CHECK, or validation failure
        '500':
          description: MSG_SUBMIT_FAIL or MSG_QUERY_FAIL; notification-task creation failure is a transaction failure and rolls back submit
  /epl-retu-isu-summary:
    post:
      operationId: eplRetuIsuSummary
      summary: Return Summary from CAD Checker to Maker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
      responses:
        '200':
          description: Return success; summary/history and notification task are persisted atomically, with Maker and effective proxy recipients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: COMMON_MSG_ERROR_LON or authorization validation failure
        '500':
          description: MSG_RETURN_FAIL or MSG_QUERY_FAIL; notification-task creation failure is a transaction failure and rolls back return
  /epl-case-isu-summary-auth:
    post:
      operationId: eplCaseIsuSummaryAuth
      summary: Authorize Summary and upload T24 file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: Authorize success, case moves to CASE_PROGRESS 26
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: COMMON_MSG_ERROR_LON or EPROIS0922_AUTHORIZE_CHECK stale T24 check-date validation
        '500':
          description: MSG_AUTHORIZE_FAIL, MSG_QUERY_FAIL, FAILED_E999 for required T24 source-data gaps, FAILED_E304 carrying EPROIS0921_UI_RAET_FIND_ERROR, T24_FILE_GENERATION_FAIL, SFTP_CONNECT_FAIL, or SFTP_UPLOAD_FAIL
  /epl-case-isu-summary-t24-result:
    post:
      operationId: eplCaseIsuSummaryT24Result
      summary: Refresh T24 deal result for Summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: T24 result refreshed and persisted; success moves case to CASE_PROGRESS 27, non-success moves case to C1 with TB_CLO_REASON C10
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/T24DealResultResponse'
        '400':
          description: COMMON_MSG_ERROR_LON or authorization validation failure
        '500':
          description: MSG_QUERY_FAIL or safe T24 result refresh failure
  /funcConfCheckDate:
    post:
      operationId: funcConfCheckDate
      summary: Internal check-date function for Summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
      responses:
        '200':
          description: Check date result returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckDateResponse'
        '400':
          description: COMMON_MSG_ERROR_LON validation failure
        '500':
          description: MSG_QUERY_FAIL
  /funcIsuT24Authorize:
    post:
      operationId: funcIsuT24Authorize
      summary: Internal T24 file generation function based on funcisut24authorize v1.5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: T24 file generated according to funcisut24authorize v1.5 primary composition source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/T24AuthorizeResponse'
        '400':
          description: COMMON_MSG_ERROR_LON validation failure
        '500':
          description: MSG_AUTHORIZE_FAIL, MSG_QUERY_FAIL, FAILED_E999 for required T24 source-data gaps, FAILED_E304 carrying EPROIS0921_UI_RAET_FIND_ERROR, or T24_FILE_GENERATION_FAIL
  /epl-ppdf-isu-summary-report:
    post:
      operationId: eplPpdfIsuSummaryReport
      summary: Download Individual Summary report PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: Report download path returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDownloadResponse'
        '400':
          description: COMMON_MSG_ERROR_LON validation failure
        '500':
          description: COMMON_MSG_DOWNLOAD_FAIL
  /epl-ppdf-isu-transaction-result-report:
    post:
      operationId: eplPpdfIsuTransactionResultReport
      summary: Download Individual transaction result report PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: Report download path returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDownloadResponse'
        '400':
          description: COMMON_MSG_ERROR_LON validation failure
        '500':
          description: COMMON_MSG_DOWNLOAD_FAIL
  /epl-ppdf-isu-message-code-record-report:
    post:
      operationId: eplPpdfIsuMessageCodeRecordReport
      summary: Download Individual message code record report PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationLangRequest'
      responses:
        '200':
          description: Report download path returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDownloadResponse'
        '400':
          description: COMMON_MSG_ERROR_LON validation failure
        '500':
          description: COMMON_MSG_DOWNLOAD_FAIL
components:
  schemas:
    ApplicationRequest:
      type: object
      required:
        - applicationNo
      properties:
        applicationNo:
          type: string
          maxLength: 30
    ApplicationLangRequest:
      type: object
      required:
        - applicationNo
        - langType
      properties:
        applicationNo:
          type: string
          maxLength: 30
        langType:
          type: string
          maxLength: 10
    SubmitSummaryRequest:
      type: object
      required:
        - applicationNo
        - empId
      properties:
        applicationNo:
          type: string
          maxLength: 30
        empId:
          type: string
          maxLength: 7
    ApiResponse:
      type: object
      properties:
        result:
          type: string
          maxLength: 20
    CheckDateResponse:
      type: object
      required:
        - checkDateResult
      properties:
        checkDateResult:
          type: boolean
        errorCode:
          type: string
          description: EPROIS0922_CLICK_CHECK for submit or EPROIS0922_AUTHORIZE_CHECK for authorize when the check date is stale.
          maxLength: 50
    T24AuthorizeResponse:
      type: object
      required:
        - t24UpPath
      properties:
        t24UpPath:
          type: string
          maxLength: 2000
    T24DealResultResponse:
      type: object
      properties:
        t24DealResultList:
          type: array
          items:
            $ref: '#/components/schemas/T24DealResultItem'
        updateMap:
          type: object
          additionalProperties:
            type: string
        RESULT:
          type: string
          maxLength: 20
    T24DealResultItem:
      type: object
      properties:
        dataSeq:
          type: integer
          minimum: 1
          maximum: 999
        messageCode:
          type: string
          maxLength: 35
        referenceNo:
          type: string
          maxLength: 35
        status:
          type: string
          maxLength: 5
        errorCode:
          type: string
          maxLength: 35
        valueDate:
          type: string
          format: date-time
        referenceRemark:
          type: string
          maxLength: 35
    ReportDownloadResponse:
      type: object
      properties:
        encryptTempFileFullPath:
          type: string
          maxLength: 2000
    SummaryInfoResponse:
      type: object
      properties:
        role:
          type: string
          maxLength: 10
        summaryQuery:
          $ref: '#/components/schemas/SummaryDetail'
        collateralQuery:
          type: array
          items:
            $ref: '#/components/schemas/CollateralSummary'
        disburOtherCollQuery:
          type: array
          items:
            $ref: '#/components/schemas/OtherCollateralSummary'
        empList:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeOption'
    SummaryDetail:
      type: object
      properties:
        applicationNo:
          type: string
          maxLength: 30
        caseProgress:
          type: string
          maxLength: 5
        cadcCode:
          type: string
          maxLength: 7
        currentUserId:
          type: string
          maxLength: 7
        disbursingDate:
          type: string
          format: date-time
        t24ResultTime:
          type: string
          description: Y only when CASE_PROGRESS is 26, DISBURSING_DATE is present, and elapsed time is greater than 10 minutes; otherwise N.
          enum:
            - Y
            - N
        result:
          type: string
          maxLength: 20
    EmployeeOption:
      type: object
      properties:
        empId:
          type: string
          maxLength: 7
        empName:
          type: string
          maxLength: 80
    CollateralSummary:
      type: object
      properties:
        applicationNo:
          type: string
          maxLength: 30
        collDataSeq:
          type: integer
          maximum: 999
        sugVal:
          type: number
          multipleOf: 0.01
    OtherCollateralSummary:
      type: object
      properties:
        applicationNo:
          type: string
          maxLength: 30
        otherCollDataSeq:
          type: integer
          maximum: 999
        otherSugVal:
          type: number
          multipleOf: 0.01

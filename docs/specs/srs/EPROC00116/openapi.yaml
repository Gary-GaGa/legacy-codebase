openapi: 3.0.3
info:
  title: EPROC00116 Financial Statement GI API
  version: 1.0.0
  description: >
    In Review / draft-for-controller-gate contract for C0 Financial Statement GI.
    All operations are POST RPC endpoints and return the platform EPRO envelope.
servers:
  - url: /
paths:
  /epl-sele-c0-financial-statement-comments:
    post:
      operationId: seleC0FinancialStatementComments
      summary: Load Financial Statement GI option lists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns option lists; business errors such as E102, E126, E201, or E999 also use HTTP 200.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SelectEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-info-c0-financial-statement-comments:
    post:
      operationId: infoC0FinancialStatementComments
      summary: Query current case Financial Statement GI data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns current case data; business errors such as E102, E116, E126, E201, or E999 also use HTTP 200.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InfoEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-quer-c0-financial-statement-comments:
    post:
      operationId: querC0FinancialStatementComments
      summary: Query copyable reference application data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceQueryRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns reference data; business errors such as E102, E116, E201, E999, or legacy no-data/message keys also use HTTP 200.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InfoEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-calc-c0-financial-statement-comments:
    post:
      operationId: calcC0FinancialStatementComments
      summary: Calculate derived Balance, Income, and Cashflow values.
      description: Read-only operation. It must not update checkpoint or financial-statement tables.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalcRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns calculated maps and result messages; business errors such as E102, E116, E201, E999, or legacy calculation keys also use HTTP 200.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CalcEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-save-c0-financial-statement-comments:
    post:
      operationId: saveC0FinancialStatementComments
      summary: Save draft or Finished Financial Statement GI data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: EPRO envelope. Success returns an empty data object; business errors such as E102, E116, E201, E999, or legacy save keys also use HTTP 200.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SaveEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-ppdf-c0-financial-statement-comments:
    post:
      operationId: ppdfC0FinancialStatementComments
      summary: Generate Financial Statement GI PDF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: PDF stream/envelope or EPRO business error, including COMMON_MSG_DOWNLOAD_SUCCESS, COMMON_MSG_DOWNLOAD_FAIL, COMMON_MSG_PRINT_FAIL, FAILED_E116.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FileEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-pxls-c0-financial-statement-comments:
    post:
      operationId: pxlsC0FinancialStatementComments
      summary: Generate Financial Statement GI Excel file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Excel stream/envelope or EPRO business error, including MSG_EXPORT_SUCCESS, COMMON_MSG_DOWNLOAD_FAIL, COMMON_MSG_PRINT_FAIL, FAILED_E116.
          content:
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FileEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
components:
  responses:
    AuthError:
      description: Authorization error for missing or invalid TB_API_AUTH endpoint permission, or failed backend case/page authorization for the requested applicationNo. Info, reference, and export operations require read access; calc, save, and Finished operations require edit access before business execution.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthErrorEnvelope'
  schemas:
    EproEnvelopeBase:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: '0000'
        message:
          type: string
          example: Success
    BusinessErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          required:
            - data
          properties:
            code:
              type: string
              description: EPRO business or validation code. E130 is the malformed request validation code for save/calc-style payloads; MSG_OVER_COUNT_LIMIT and MSG_QUERY_FAIL are explicit PRD-compatible business error keys.
              enum:
                - E102
                - E116
                - E126
                - E130
                - E201
                - E999
                - MSG_DATA_NOT_FOUND
                - MSG_OVER_COUNT_LIMIT
                - MSG_QUERY_FAIL
                - MSG_ERROR_APPLICATION_NO
                - COMMON_MSG_TOTAL_FAIL
                - COMMON_MSG_ERROR_LON
                - COMMON_MSG_PRINT_FAIL
                - COMMON_MSG_DOWNLOAD_SUCCESS
                - COMMON_MSG_DOWNLOAD_FAIL
                - COMMON_MSG_SAVE_SUCCESS
                - COMMON_MSG_SAVE_FAIL
                - MSG_EXPORT_SUCCESS
                - COMMOM_MSG_NO_DATA
                - EPROI0_0160_MSG_ERRO_CURRENCY
                - EPROI00119_MSG_VALIDATE_004
            data:
              type: object
              nullable: true
              description: May be null or contain field validation details.
              additionalProperties: true
    AuthErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          required:
            - data
          properties:
            code:
              type: string
              enum:
                - E405
                - E498
            data:
              type: object
              nullable: true
              additionalProperties: true
    SelectRequest:
      type: object
      required:
        - applicationNo
        - langType
      properties:
        applicationNo:
          type: string
          maxLength: 30
        langType:
          type: string
          maxLength: 10
    InfoRequest:
      type: object
      required:
        - applicationNo
        - isQuery
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isQuery:
          type: boolean
    ReferenceQueryRequest:
      type: object
      required:
        - reApplicationNo
      properties:
        reApplicationNo:
          type: string
          maxLength: 30
    ExportRequest:
      type: object
      required:
        - applicationNo
        - langType
      properties:
        applicationNo:
          type: string
          maxLength: 30
        langType:
          type: string
          maxLength: 10
    SaveRequest:
      type: object
      required:
        - applicationNo
        - isFinish
        - mainMap
        - balanceMap
        - incomeMap
        - cashflowMap
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isFinish:
          type: boolean
        mainMap:
          $ref: '#/components/schemas/FinancialMain'
        balanceMap:
          type: array
          description: Required save detail list. Must be non-empty, contain no null rows, have one to five rows, and have the same length as incomeMap and cashflowMap.
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/BalanceRow'
        incomeMap:
          type: array
          description: Required save detail list. Must be non-empty, contain no null rows, have one to five rows, and have the same length as balanceMap and cashflowMap.
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/IncomeRow'
        cashflowMap:
          type: array
          description: Required save detail list. Must be non-empty, contain no null rows, have one to five rows, and have the same length as balanceMap and incomeMap.
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/CashflowRow'
    CalcRequest:
      type: object
      required:
        - applicationNo
        - balanceMap
        - incomeMap
        - cashflowMap
      properties:
        applicationNo:
          type: string
          maxLength: 30
        balanceMap:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/BalanceRow'
        incomeMap:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IncomeRow'
        cashflowMap:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CashflowRow'
    SelectEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          properties:
            data:
              type: object
              properties:
                currencyList:
                  type: array
                  items:
                    $ref: '#/components/schemas/OptionItem'
                currencyUnitList:
                  type: array
                  items:
                    $ref: '#/components/schemas/OptionItem'
                typeOfYearList:
                  type: array
                  items:
                    $ref: '#/components/schemas/OptionItem'
    InfoEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          properties:
            data:
              type: object
              properties:
                haveData:
                  type: string
                  enum: [Y, N]
                  description: Y only when main, Balance, Income, and Cashflow persisted data all exist.
                mainMap:
                  $ref: '#/components/schemas/FinancialMain'
                balanceMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/BalanceRow'
                incomeMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/IncomeRow'
                cashflowMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/CashflowRow'
    CalcEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          properties:
            data:
              type: object
              properties:
                balanceCMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/BalanceCalcRow'
                incomeCMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/IncomeCalcRow'
                cashflowCMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/CashflowCalcRow'
                resultMsg:
                  type: array
                  items:
                    type: string
    SaveEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
              description: Current save returns an empty object on success.
    FileEnvelope:
      allOf:
        - $ref: '#/components/schemas/EproEnvelopeBase'
        - type: object
          properties:
            data:
              type: object
              properties:
                fileName:
                  type: string
                encryptTempFileFullPath:
                  type: string
                contentType:
                  type: string
    OptionItem:
      type: object
      required:
        - value
        - label
      properties:
        value:
          type: string
          maxLength: 50
        label:
          type: string
          maxLength: 100
    FinancialMain:
      type: object
      description: Public API uses five structured highlight fields. Legacy raw `HIGHLIGHT` pipe text is migration provenance only and is not exposed as a public save/query field; if preserved, it belongs in DB `HIGHLIGHT_CLOB`.
      additionalProperties: false
      properties:
        currency:
          type: string
          maxLength: 3
        currencyUnit:
          type: string
          maxLength: 2
        companyName:
          type: string
          maxLength: 200
        criteria1:
          type: string
          maxLength: 1
        criteria2:
          type: string
          maxLength: 1
        criteria3:
          type: string
          maxLength: 1
        needAuditedFS:
          type: string
          maxLength: 1
        haveAuditedFS:
          type: string
          maxLength: 1
        auditFirm:
          type: string
          maxLength: 50
        opinionMemo:
          type: string
          maxLength: 500
        loanRepaymentHT:
          type: string
          maxLength: 6000
        financialSituationHT:
          type: string
          maxLength: 6000
        businessRiskHT:
          type: string
          maxLength: 6000
        borrowerRiskHT:
          type: string
          maxLength: 6000
        summaryHT:
          type: string
          maxLength: 6000
    BalanceRow:
      type: object
      description: Public JSON uses canonical field names. Persistence maps canonical `apRelatedParties` and `shareholdersLoan` to physical DB typo columns `AP_RELATED_PARITIES` and `SHARDHOLDERS_LOAN`.
      additionalProperties: true
      properties:
        year:
          type: string
          maxLength: 10
        periods:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
        totalAssets:
          type: string
        totalLiabEquity:
          type: string
        difference:
          type: string
        cashEquivalent:
          type: string
        totalCurrentAassets:
          type: string
        nonCurrentAssets:
          type: string
        currentLiabilities:
          type: string
        nonCurrentLiabilities:
          type: string
        totalEquity:
          type: string
    IncomeRow:
      type: object
      description: Public JSON uses canonical field names. Persistence maps income date/year semantics and `impairmentLoss` to physical DB typo columns `IMCOME_DATE` and `IMPAIMENT_LOSS`.
      additionalProperties: true
      properties:
        year:
          type: string
          maxLength: 10
        periods:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
        revenues:
          type: string
        costOfGoodSold:
          type: string
        grossProfit:
          type: string
        operatingExpenses:
          type: string
        operatingProfit:
          type: string
        nonOperatingIncome:
          type: string
        nonOperatingExpenses:
          type: string
        profitBeforeTax:
          type: string
        currentPeriodProfit:
          type: string
        minorityInterests:
          type: string
        attributedParentCompany:
          type: string
    CashflowRow:
      type: object
      additionalProperties: true
      properties:
        year:
          type: string
          maxLength: 10
        period:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
        operatingNetCashflow:
          type: string
        investingNetCashflow:
          type: string
        financingNetCashflow:
          type: string
        netIncreOrDecre:
          type: string
        openingBalance:
          type: string
        endBalance:
          type: string
    BalanceCalcRow:
      type: object
      additionalProperties: true
      properties:
        totalCurrentAassets:
          type: string
        netFixedAssets:
          type: string
        nonCurrentAssets:
          type: string
        currentLiabilities:
          type: string
        nonCurrentLiabilities:
          type: string
        totalEquity:
          type: string
        totalAssets:
          type: string
        totalLiabEquity:
          type: string
        difference:
          type: string
    IncomeCalcRow:
      type: object
      additionalProperties: true
      properties:
        grossProfit:
          type: string
        operatingExpenses:
          type: string
        operatingProfit:
          type: string
        nonOperatingIncome:
          type: string
        nonOperatingExpenses:
          type: string
        profitBeforeTax:
          type: string
        attributedParentCompany:
          type: string
    CashflowCalcRow:
      type: object
      additionalProperties: true
      properties:
        operatingNetCashflow:
          type: string
        openingBalance:
          type: string
        endBalance:
          type: string

openapi: 3.0.3
info:
  title: EPROC00110 Corporate Credit Investigation Frame API
  version: 0.1.0
  description: >
    Draft-for-review SRS contract for EPROC00110. Evidence:
    docs/specs/prd/PRD-CDC-EPRO-0001-EPROC00110-v1.0.md:420-429 and
    backend/src/main/java/khd/svc/epro/controller/corporate/CsuCreditInvestigationController.java:32-50.
servers:
  - url: https://example.com/api
    description: Placeholder base URL; deployment URL is environment-specific.
tags:
  - name: EPROC00110
paths:
  /epl-info-c0-credit-investigation-tab:
    post:
      tags:
        - EPROC00110
      summary: Load corporate credit-investigation source frame, business type, visible tabs, and page map
      operationId: getCsuCreditInvestigationTab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCreditInvestigationTabRequest'
      responses:
        '200':
          description: Loaded current source frame, business type, ordered visible tabs, source aliases, and checkpoint page map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCreditInvestigationTabResponseEnvelope'
        '400':
          description: Validation error, including blank applicationNo or invalid sourceFrame.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: MSG_DATA_NOT_FOUND when applicationNo has no summary row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: MSG_OVER_COUNT_LIMIT when legacy-equivalent module query limit is exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_INITIAL_FAIL or MSG_QUERY_FAIL for initial/query failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-confirm-c0-credit-investigation-switch:
    post:
      tags:
        - EPROC00110
      summary: Issue a destructive GI/FI switch confirmation token
      operationId: confirmCsuCreditInvestigationSwitch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmCreditInvestigationSwitchRequest'
      responses:
        '200':
          description: Single-use confirmation token issued for the requested old/new business type transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmCreditInvestigationSwitchResponseEnvelope'
        '400':
          description: Validation error, missing warning acceptance, invalid sourceFrame, invalid businessType, or same old/new businessType.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User has no backend edit permission or is in old-case mode for destructive GI/FI switch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: MSG_DATA_NOT_FOUND when applicationNo has no summary row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Current persisted business type/version does not match fromBusinessType.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL for token issuance or current-state validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-save-c0-credit-investigation-tab:
    post:
      tags:
        - EPROC00110
      summary: Save GI/FI business type switch and reset affected data
      operationId: saveCsuCreditInvestigationTab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCreditInvestigationTabRequest'
      responses:
        '200':
          description: Business type saved; destructive table cleanup and checkpoint reset completed in one transaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          description: Validation error; missing confirmationToken / switchGeneration; blank sourceFrame/businessType; invalid sourceFrame/businessType; or malformed confirmationToken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User has no backend edit permission or is in old-case mode for destructive GI/FI switch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: MSG_DATA_NOT_FOUND when applicationNo has no summary row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid, expired, reused, stale, or mismatched confirmationToken / switchGeneration guard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: MSG_OVER_COUNT_LIMIT when legacy-equivalent module query limit is exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL for delete/update/checkpoint transaction failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    GetCreditInvestigationTabRequest:
      type: object
      required:
        - applicationNo
        - sourceFrame
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: TB_LON_SUMMARY_INFO.APPLICATION_NO.
        sourceFrame:
          $ref: '#/components/schemas/SourceFrame'
      additionalProperties: false
    ConfirmCreditInvestigationSwitchRequest:
      type: object
      required:
        - applicationNo
        - sourceFrame
        - fromBusinessType
        - toBusinessType
        - warningAccepted
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: TB_LON_SUMMARY_INFO.APPLICATION_NO.
        sourceFrame:
          $ref: '#/components/schemas/SourceFrame'
        fromBusinessType:
          $ref: '#/components/schemas/BusinessType'
        toBusinessType:
          $ref: '#/components/schemas/BusinessType'
        warningAccepted:
          type: boolean
          description: Must be true only after the user accepts the finalized delete-scope warning text from R18.
      additionalProperties: false
    SaveCreditInvestigationTabRequest:
      type: object
      required:
        - applicationNo
        - sourceFrame
        - businessType
        - confirmationToken
        - switchGeneration
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: TB_LON_SUMMARY_INFO.APPLICATION_NO.
        sourceFrame:
          $ref: '#/components/schemas/SourceFrame'
        businessType:
          $ref: '#/components/schemas/BusinessType'
        confirmationToken:
          type: string
          maxLength: 64
          description: Required token issued by epl-confirm-c0-credit-investigation-switch; single-use, valid for 10 minutes, and bound to actor/session, applicationNo, sourceFrame, old businessType, new businessType, and switchGeneration.
        switchGeneration:
          type: integer
          format: int64
          minimum: 0
          description: Server-issued monotonic generation for applicationNo plus sourceFrame; must match the token and current server-side generation at save time.
      additionalProperties: false
    ConfirmCreditInvestigationSwitchResponseEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 20
          description: Platform response code.
        message:
          type: string
          maxLength: 400
          description: Platform response message.
        data:
          $ref: '#/components/schemas/ConfirmCreditInvestigationSwitchResponse'
      additionalProperties: false
    ConfirmCreditInvestigationSwitchResponse:
      type: object
      required:
        - confirmationToken
        - expiresAt
        - fromBusinessType
        - toBusinessType
        - switchGeneration
      properties:
        confirmationToken:
          type: string
          maxLength: 64
          description: Single-use token valid for 10 minutes from issuance.
        expiresAt:
          type: string
          format: date-time
          description: Server-side token expiry timestamp.
        fromBusinessType:
          $ref: '#/components/schemas/BusinessType'
        toBusinessType:
          $ref: '#/components/schemas/BusinessType'
        switchGeneration:
          type: integer
          format: int64
          minimum: 0
          description: Server-side generation bound into the token; successful switch advances this generation and invalidates older tokens for the same applicationNo plus sourceFrame.
      additionalProperties: false
    GetCreditInvestigationTabResponseEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 20
          description: Platform response code.
        message:
          type: string
          maxLength: 400
          description: Platform response message.
        data:
          $ref: '#/components/schemas/GetCreditInvestigationTabResponse'
      additionalProperties: false
    GetCreditInvestigationTabResponse:
      type: object
      required:
        - sourceFrame
        - businessType
        - visibleTabs
        - sourceTabMap
        - pageMap
      properties:
        sourceFrame:
          $ref: '#/components/schemas/SourceFrame'
        businessType:
          type: string
          maxLength: 1
          enum:
            - G
            - F
        assessmentType:
          type: string
          maxLength: 1
          nullable: true
          description: Effective assessment type; default is 2 when both summary type fields are blank.
        visibleTabs:
          $ref: '#/components/schemas/VisibleTabs'
        sourceTabMap:
          $ref: '#/components/schemas/SourceTabMap'
        pageMap:
          $ref: '#/components/schemas/PageMap'
      additionalProperties: false
    SourceFrame:
      type: string
      description: >
        Source page family discriminator. GENERAL_0110 preserves legacy
        EPROC0_0110 semantics; RENEWAL_0210 preserves legacy EPROC0_0210
        renewal/change semantics and 021x source aliases.
      enum:
        - GENERAL_0110
        - RENEWAL_0210
    BusinessType:
      type: string
      maxLength: 1
      enum:
        - G
        - F
      description: G for General Industry (GI), F for Financial Industry (FI).
    VisibleTabs:
      type: array
      description: >
        Ordered tab visibility carrier using normalized refactor funcIds.
        Order follows legacy tab assembly: borrower group exposure, CBC,
        GI/FI statement, GI/FI evaluation, non-old corporate scorecard, and
        non-old CS collateral assessment. Visibility must be read from this
        field, not inferred from pageMap key presence or checkpoint value.
        Use sourceTabMap to preserve 011x/021x legacy source aliases.
      items:
        $ref: '#/components/schemas/VisibleTabCode'
      minItems: 4
      uniqueItems: true
    VisibleTabCode:
      type: string
      enum:
        - EPROC00115
        - EPROC00112
        - EPROC00116
        - EPROC00117
        - EPROC00119
        - EPROC00120
        - EPROC00118
        - EPROC00114
    SourceTabMap:
      type: object
      description: >
        Maps normalized refactor tab codes to source-confirmed legacy page
        codes. For GENERAL_0110 values must be EPROC0_011x/012x aliases; for
        RENEWAL_0210 values must be EPROC0_021x/022x aliases. Missing 021x
        aliases for RENEWAL_0210 fail R9/QA-009.
        EPROC00114 is CS-only; CU responses must omit it from sourceTabMap,
        pageMap, and visibleTabs even though CS responses may include it.
      properties:
        EPROC00112:
          $ref: '#/components/schemas/SourceTabCode'
        EPROC00114:
          allOf:
            - $ref: '#/components/schemas/SourceTabCode'
          description: CS-only collateral-assessment tab; CU responses must omit this key.
        EPROC00115:
          $ref: '#/components/schemas/SourceTabCode'
        EPROC00116:
          $ref: '#/components/schemas/SourceTabCode'
        EPROC00117:
          $ref: '#/components/schemas/SourceTabCode'
        EPROC00118:
          $ref: '#/components/schemas/SourceTabCode'
        EPROC00119:
          $ref: '#/components/schemas/SourceTabCode'
        EPROC00120:
          $ref: '#/components/schemas/SourceTabCode'
      additionalProperties: false
    SourceTabCode:
      type: string
      enum:
        - EPROC0_0112
        - EPROC0_0114
        - EPROC0_0115
        - EPROC0_0116
        - EPROC0_0117
        - EPROC0_0118
        - EPROC0_0119
        - EPROC0_0120
        - EPROC0_0212
        - EPROC0_0214
        - EPROC0_0215
        - EPROC0_0216
        - EPROC0_0217
        - EPROC0_0218
        - EPROC0_0219
        - EPROC0_0220
    PageMap:
      type: object
      description: >
        Child page checkpoint state map keyed by normalized refactor funcIds.
        This is not the visibility carrier. For pages listed in visibleTabs,
        Y means pending / still needs work and N means completed. Hidden or
        inactive pages may have N without becoming visible. For renewal/change
        source frames, use sourceTabMap to preserve 021x source provenance.
        EPROC00114 is CS-only; CU responses must omit it from pageMap because
        TB_CHECK_POINTS_CU does not define the EPROC00114 checkpoint column.
      properties:
        EPROC00112:
          $ref: '#/components/schemas/CheckpointValue'
        EPROC00114:
          allOf:
            - $ref: '#/components/schemas/CheckpointValue'
          description: CS-only collateral-assessment checkpoint; CU responses must omit this key.
        EPROC00115:
          $ref: '#/components/schemas/CheckpointValue'
        EPROC00116:
          $ref: '#/components/schemas/CheckpointValue'
        EPROC00117:
          $ref: '#/components/schemas/CheckpointValue'
        EPROC00118:
          $ref: '#/components/schemas/CheckpointValue'
        EPROC00119:
          $ref: '#/components/schemas/CheckpointValue'
        EPROC00120:
          $ref: '#/components/schemas/CheckpointValue'
      additionalProperties: false
    CheckpointValue:
      type: string
      maxLength: 1
      enum:
        - Y
        - N
      description: Y means pending / still needs work for a visible tab; N means completed for a visible tab.
    EmptySuccessResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 20
        message:
          type: string
          maxLength: 400
        data:
          type: object
          additionalProperties: false
      additionalProperties: false
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          maxLength: 40
          description: >
            Platform error code or legacy message key carrier. This API carries
            MSG_INITIAL_FAIL, MSG_DATA_NOT_FOUND, MSG_QUERY_FAIL, and MSG_OVER_COUNT_LIMIT
            where applicable.
        message:
          type: string
          maxLength: 400
        details:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: false

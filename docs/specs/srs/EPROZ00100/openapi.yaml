openapi: 3.0.3
info:
  title: EPROZ00100 To Do List API
  version: 0.1.0
  description: Draft SRS contract for EPROZ00100. Not approved.
paths:
  /epl-init-z0-todolist:
    post:
      operationId: eplInitZ0Todolist
      summary: Initialize To Do List dashboard and optional redistribution
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '403':
          description: ACCESS_DENIED or platform authorization error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: REDISTRIBUTION_FAILED or MSG_QUERY_FAIL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-list-todolist:
    post:
      operationId: eplListTodolist
      summary: Query general To Do List or CAD/TLOD task list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodolistQueryRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodolistQueryResponse'
        '400':
          description: INVALID_CAD_QUERY_CONDITION or E102 field validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ACCESS_DENIED or platform authorization error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-case-insert-delreason:
    post:
      operationId: eplCaseInsertDelreason
      summary: Delete case and insert delete reason
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          description: MISSING_APPLICATION_NO, MISSING_REASON, MISSING_OTHER_REASON, or E102 field validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: FORBIDDEN_ACTION for business-role rejection; ACCESS_DENIED for platform authorization failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_UPDATE_FAIL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-case-insert-cloreason:
    post:
      operationId: eplCaseInsertCloreason
      summary: Close CAD/TLOD case and insert close reason
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          description: MISSING_APPLICATION_NO, MISSING_REASON, MISSING_OTHER_REASON, or E102 field validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: FORBIDDEN_ACTION for business-role rejection; ACCESS_DENIED for platform authorization failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_UPDATE_FAIL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-file-z0-proposal-download:
    post:
      operationId: eplFileZ0ProposalDownload
      summary: Generate proposal download reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadResponse'
        '400':
          description: MISSING_APPLICATION_NO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: FORBIDDEN_ACTION for business-role rejection; ACCESS_DENIED for platform authorization failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: DOWNLOAD_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-session-z0-current-application:
    post:
      operationId: eplSessionZ0CurrentApplicationSet
      summary: Set current application session context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          description: MISSING_APPLICATION_NO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ACCESS_DENIED or platform authorization error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: eplSessionZ0CurrentApplicationClear
      summary: Clear current application session context
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '403':
          description: ACCESS_DENIED or platform authorization error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-sele-z0-delete-reason:
    get:
      operationId: eplSeleZ0DeleteReason
      summary: Query delete reason options
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '403':
          description: ACCESS_DENIED or platform authorization error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-sele-z0-close-reason:
    get:
      operationId: eplSeleZ0CloseReason
      summary: Query close reason options
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '403':
          description: ACCESS_DENIED or platform authorization error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MSG_QUERY_FAIL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PromptResponse:
      type: object
      properties:
        role:
          type: string
          maxLength: 3
        isAO:
          type: boolean
        isCA:
          type: boolean
        isCRCOSCO:
          type: boolean
        isCOSCO:
          type: boolean
        isCADMERCER:
          type: boolean
        redistributionApplied:
          type: boolean
    TodolistQueryRequest:
      type: object
      required:
        - queryMode
      properties:
        queryMode:
          type: string
          enum:
            - GENERAL
            - CAD
        applicationNo:
          type: string
          maxLength: 30
        startDecisionDate:
          type: string
          maxLength: 10
          pattern: '^\d{2}/\d{2}/\d{4}$'
          description: dd/MM/yyyy
        endDecisionDate:
          type: string
          maxLength: 10
          pattern: '^\d{2}/\d{2}/\d{4}$'
          description: dd/MM/yyyy
        docNo:
          type: string
          maxLength: 30
        mainBorrowerName:
          type: string
          maxLength: 30
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
          maximum: 500
    TodolistQueryResponse:
      type: object
      properties:
        toDoList:
          type: array
          items:
            $ref: '#/components/schemas/TodolistItem'
        totalCount:
          type: integer
    TodolistItem:
      type: object
      properties:
        applicationNo:
          type: string
          maxLength: 30
        receivedDate:
          type: string
        applicationDate:
          type: string
        decisionDate:
          type: string
        loanName:
          type: string
          maxLength: 200
        productName:
          type: string
          maxLength: 50
        caseProgress:
          type: string
          maxLength: 5
        appProcessName:
          type: string
          maxLength: 200
        mainBorrowerName:
          type: string
          maxLength: 100
        showRelated:
          type: string
          maxLength: 1
        usdSumLoanAmount:
          type: string
          pattern: '^USD -?\d{1,15}(\.\d{1,2})?$'
          description: Sum of NUMBER(17,2) USD loan amounts, formatted without silent rounding or truncation.
        khrSumLoanAmount:
          type: string
          pattern: '^KHR -?\d{1,15}(\.\d{1,2})?$'
          description: Sum of NUMBER(17,2) KHR loan amounts, formatted without silent rounding or truncation.
        finalApprovalLevel:
          type: string
          maxLength: 10
        docNo1:
          type: string
          maxLength: 30
        salesChannel:
          type: string
          maxLength: 50
        page:
          type: string
          maxLength: 30
    DeleteRequest:
      type: object
      required:
        - applicationNo
        - reasonList
      properties:
        applicationNo:
          type: string
          maxLength: 30
        reasonList:
          type: array
          minItems: 1
          items:
            type: string
            maxLength: 10
          description: Client reason array; backend joins to the DB semicolon string.
        otherReason:
          type: string
          maxLength: 100
          description: Required when reasonList contains D99; reject over 100 chars without truncation.
    CloseRequest:
      type: object
      required:
        - applicationNo
        - reasonList
      properties:
        applicationNo:
          type: string
          maxLength: 30
        reasonList:
          type: array
          minItems: 1
          items:
            type: string
            maxLength: 10
          description: Client close-reason array; backend joins to the DB semicolon string.
        otherReason:
          type: string
          maxLength: 100
          description: Required when reasonList contains C99; reject over 100 chars without truncation.
    DownloadRequest:
      type: object
      required:
        - applicationNo
        - type
      properties:
        applicationNo:
          type: string
          maxLength: 30
        type:
          type: string
          enum:
            - CS
            - CU
            - IS
            - IU
          description: Requested proposal family; backend must validate against TB_LON_SUMMARY_INFO.LON_ATTRIBUTE and SECURE_ATTRIBUTE.
    DownloadResponse:
      type: object
      properties:
        downloadToken:
          type: string
          maxLength: 200
          description: One-time short-lived token; response must not expose reusable local filesystem paths.
        expiresAt:
          type: string
          format: date-time
    SessionRequest:
      type: object
      required:
        - applicationNo
      properties:
        applicationNo:
          type: string
          maxLength: 30
        action:
          type: string
          maxLength: 30
    ReasonResponse:
      type: object
      properties:
        dataMap:
          type: object
          additionalProperties:
            type: string
    MutationResponse:
      type: object
      properties:
        code:
          type: string
          maxLength: 20
        message:
          type: string
          maxLength: 200
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          maxLength: 50
          description: MISSING_APPLICATION_NO, MISSING_REASON, MISSING_OTHER_REASON, INVALID_CAD_QUERY_CONDITION, FORBIDDEN_ACTION, ACCESS_DENIED, REDISTRIBUTION_FAILED, DOWNLOAD_FAILED, E102, MSG_QUERY_FAIL, MSG_UPDATE_FAIL.
        message:
          type: string
          maxLength: 500

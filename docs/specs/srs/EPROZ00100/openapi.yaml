# OpenAPI（合約草案，gate①）— EPROZ00100 TO DO LIST / Work-list Dashboard
# 由 PRD CDC-EPRO-0001 §6 轉；endpoint 用真實 epl-* RPC（PRD 的 /api/... REST 為理想化）。
# ⚠️ prompt/setSession/clearSession 不在此（method 受 TBD-002、session 去留受 TBD-008）→ 見 spec.md Endpoints 註。
# ⚠️ RD 於系統開發規格書定版 DTO 型別/enum/validation/錯誤 mapping/範例。
openapi: 3.0.3
info:
  title: EPROZ00100 TO DO LIST / Work-list Dashboard
  version: 0.2.0-draft
  description: >
    PRD CDC-EPRO-0001 v1.1。TBD 裁定狀態詳 spec.md §@PENDING（單一出處；blocking: TBD-002/004/006）。
    method/欄位以 spec.md Rn 為準。as-is 主清單端點＝epl-list-todolist（POST，合併 initQuery+queryCAD role 分支）。
paths:
  /epl-list-todolist:                      # R3/R4/R5（一般清單）＋R6/R7（CAD role 404/405 分支）
    post:
      summary: 待辦清單查詢（一般 role 與 CAD role 分支；含分頁）
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ToDoListRequest' } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ToDoListResponse' } } } }
        '400': { description: 'INVALID_CAD_QUERY_CONDITION（R7：CAD 查詢無有效條件或日期區間不完整）' }
  /epl-sele-todolist-delreason:            # R13：刪除原因 code→display map
    get:
      summary: 取得刪除原因選單
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReasonMapResponse' } } } }
  /epl-sele-todolist-cloreason:            # R13：結案原因 code→display map
    get:
      summary: 取得結案原因選單
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReasonMapResponse' } } } }
  /epl-save-todolist-delete:               # R9：刪除（mutating → POST、單一交易）
    post:
      summary: 刪除案件（寫 DEL_REASON/APP_HISTORY、summary CASE_PROGRESS=D1，單一交易）
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/DeleteRequest' } } }
      responses:
        '200': { description: OK }
        '400': { description: 'MISSING_APPLICATION_NO / MISSING_REASON / MISSING_OTHER_REASON（R9：必填）' }
        '403': { description: 'FORBIDDEN_ACTION（R9/R14：AO role 003 不得刪除；BE 權威）' }
        '500': { description: 'rollback（R9：交易任一步失敗整批回滾）' }
  /epl-save-todolist-close:                # R10：CAD 結案（mutating → POST、單一交易）
    post:
      summary: CAD 結案（寫 CLO_REASON/APP_HISTORY、summary CASE_PROGRESS=C1、清 CURRENT_USER_ID、IS_AUTODIS→MC/YC）
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CloseRequest' } } }
      responses:
        '200': { description: OK }
        '400': { description: 'MISSING_APPLICATION_NO / MISSING_REASON / MISSING_OTHER_REASON（R10：必填）' }
        '403': { description: 'FORBIDDEN_ACTION（R14：未授權角色不得結案）' }
        '500': { description: 'rollback（R10）' }
  /epl-file-todolist-download:             # R11：呈報書下載（@PENDING TBD-006 安全/檔案處理）
    post:
      summary: proposal download（依 TYPE dispatch printProposal；不異動業務資料）
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/DownloadRequest' } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DownloadResponse' } } } }
        '400': { description: 'MISSING_APPLICATION_NO（R11：未提供 applicationNo）' }
        '403': { description: 'FORBIDDEN_ACTION（R14：無權下載）' }
        '500': { description: 'DOWNLOAD_FAILED（R11：產製/加密失敗）' }
components:
  schemas:
    LangType: { type: string, enum: [zh_TW, en_US], description: 'R4：僅影響呈現翻譯、不作資料 WHERE 過濾' }
    ToDoListRequest:
      type: object
      required: [langType, page, size]
      properties:
        langType: { $ref: '#/components/schemas/LangType' }
        page: { type: integer, minimum: 1 }
        size: { type: integer, minimum: 1, maximum: 200, description: 'R14②：上限 200（避免無限制大量回傳；SA 預設可調）' }
        applicationNo: { type: string, maxLength: 30, description: '選填 filter' }
        docNo: { type: string, maxLength: 30, description: 'CAD 查詢（@PENDING TBD-004：DOC_NO vs module 讀 NO mapping）' }
        mainBorrowerName: { type: string, maxLength: 30, description: 'trim/upper-case like' }
        startDecisionDate: { type: string, description: 'dd/MM/yyyy；與 endDecisionDate 成對（R7）' }
        endDecisionDate: { type: string, description: 'dd/MM/yyyy；與 startDecisionDate 成對（R7）' }
    ToDoListResponse:
      type: object
      properties:
        totalCount: { type: integer, description: 'R4：任一語系筆數一致' }
        toDoList:
          type: array
          items: { $ref: '#/components/schemas/ToDoListItem' }
    ToDoListItem:
      type: object
      description: 'R5（一般清單）／R6（CAD 回傳欄）'
      properties:
        applicationNo: { type: string, maxLength: 30 }
        applicationDate: { type: string, description: 'R5：01/01/1900 顯示空白' }
        borrowerName: { type: string, description: 'R5：個金 main / 企金 corp' }
        loanType: { type: string }
        productName: { type: string }
        processName: { type: string }
        amount: { type: string, description: 'R5：USD/KHR 加總' }
        showRelated: { type: string, enum: [Y, N], description: 'R5：IS_Y=Y related party→Y' }
        page: { type: string, description: 'R8：導頁目標' }
        decisionDate: { type: string, description: 'R6（CAD）' }
        approvalLevel: { type: string, description: 'R6（CAD）' }
        docNo1: { type: string, description: 'R6：企金=REGISTER_NO、個金=文件欄位轉換' }
        salesChannel: { type: string, description: 'R6（CAD）' }
        caseProgress: { type: string, maxLength: 5, description: 'R3/R8（CASE_PROGRESS）' }
    ReasonMapResponse:
      type: object
      description: 'R13：reason code→display（值＝@PENDING TBD-007）'
      properties:
        dataMap:
          type: object
          additionalProperties: { type: string }
    DeleteRequest:
      type: object
      required: [applicationNo, reasonList]
      properties:
        applicationNo: { type: string, maxLength: 30 }
        reasonList:
          type: array
          minItems: 1
          items: { type: string }
          description: 'R9：至少一筆 DEL_REASON code'
        othReason: { type: string, maxLength: 100, description: 'R9：D99 選取時必填' }
    CloseRequest:
      type: object
      required: [applicationNo, reasonList]
      properties:
        applicationNo: { type: string, maxLength: 30 }
        reasonList:
          type: array
          minItems: 1
          items: { type: string }
          description: 'R10：至少一筆 CLO_REASON code'
        othReason: { type: string, maxLength: 100, description: 'R10：C99 選取時必填' }
    DownloadRequest:
      type: object
      required: [applicationNo, type]
      properties:
        applicationNo: { type: string, maxLength: 30 }
        type: { type: string, enum: [CS, CU, IS, IU], description: 'R11：dispatch printProposal' }
    DownloadResponse:
      type: object
      properties:
        encryptTempFileFullPath:
          type: string
          description: 'R11/@PENDING TBD-006：as-is 回 encrypted temp path；to-be 建議改 download token'

openapi: 3.0.3
info:
  title: EPROC00120 Corporate Financial Evaluation FI API
  version: 0.2.0
  description: >
    Ready-for-owner-finalization SRS contract for EPROC00120. The info API
    returns page-local applicationName, checkpoint, and financialList. Parent
    progress is refreshed through an independent parent/checkpoint endpoint.
    Current code exposes cetOneCapitalRatio and totalCapitalRatio, but this SRS
    excludes them from the to-be page API because PRD/db-diff do not confirm
    those fields.
servers:
  - url: https://example.com/api
    description: Placeholder base URL; deployment URL is environment-specific.
tags:
  - name: EPROC00120
paths:
  /epl-info-c0-financial-evaluation-table-fi:
    post:
      tags:
        - EPROC00120
      summary: Load corporate FI financial-evaluation ratios
      operationId: infoCsuFinancialEvaluationTableFi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoFinancialEvaluationFiRequest'
      responses:
        '200':
          description: >
            Platform envelope for success or business error. Business error
            codes include MSG_DATA_NOT_FOUND, MSG_OVER_COUNT_LIMIT,
            MSG_QUERY_FAIL, COMMON_MSG_ERROR_LON, and ErrorInputException
            where validation is mapped from legacy/PRD. Source DATA_SEQ/count
            mismatch and PERIODS=0 handling follow spec.md R10-R11.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoFinancialEvaluationFiResponseEnvelope'
        '401':
          description: ACCESS_DENIED / E405 when authentication or TB_API_AUTH mapping is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /epl-save-c0-financial-evaluation-table-fi:
    post:
      tags:
        - EPROC00120
      summary: Save or finish corporate FI financial-evaluation ratios
      operationId: saveCsuFinancialEvaluationTableFi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveFinancialEvaluationFiRequest'
      responses:
        '200':
          description: >
            Platform envelope for COMMON_MSG_SAVE_SUCCESS or business error.
            Business error codes include COMMON_MSG_ERROR_LON,
            COMMON_MSG_SAVE_FAIL, MSG_DATA_NOT_FOUND, MSG_QUERY_FAIL,
            ErrorInputException, and validation ReturnEnum codes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveFinancialEvaluationFiResponseEnvelope'
        '401':
          description: ACCESS_DENIED / E405 when authentication or TB_API_AUTH mapping is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    InfoFinancialEvaluationFiRequest:
      type: object
      required:
        - applicationNo
        - isQuery
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: TB_LON_SUMMARY_INFO.APPLICATION_NO.
        isQuery:
          type: boolean
          description: true reads saved historical rows; false prepares editable recalculation.
      additionalProperties: false
    SaveFinancialEvaluationFiRequest:
      description: Draft save and Finished share the same endpoint but have separate validation tiers.
      oneOf:
        - $ref: '#/components/schemas/SaveFinancialEvaluationFiDraftRequest'
        - $ref: '#/components/schemas/SaveFinancialEvaluationFiFinishedRequest'
    SaveFinancialEvaluationFiDraftRequest:
      type: object
      required:
        - applicationNo
        - isFinish
        - financialList
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: TB_LON_SUMMARY_INFO.APPLICATION_NO.
        isFinish:
          type: boolean
          enum:
            - false
          description: Draft save; allows incomplete ratio content.
        financialList:
          type: array
          minItems: 0
          maxItems: 5
          items:
            $ref: '#/components/schemas/FinancialEvaluationFiRow'
      additionalProperties: false
    SaveFinancialEvaluationFiFinishedRequest:
      type: object
      required:
        - applicationNo
        - isFinish
        - financialList
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: TB_LON_SUMMARY_INFO.APPLICATION_NO.
        isFinish:
          type: boolean
          enum:
            - true
          description: Finished save; backend enforces row-level required fields and checkpoint completion. Backend must reject true for trusted RC old-case context before mutation.
        financialList:
          type: array
          minItems: 0
          maxItems: 5
          items:
            $ref: '#/components/schemas/FinancialEvaluationFiFinishedRow'
      additionalProperties: false
    InfoFinancialEvaluationFiResponseEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 64
          description: Platform response code; nonzero still uses HTTP 200 for business errors.
        message:
          type: string
          maxLength: 200
        data:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/InfoFinancialEvaluationFiResponse'
      additionalProperties: false
    InfoFinancialEvaluationFiResponse:
      type: object
      required:
        - applicationName
        - checkpoint
        - financialList
      properties:
        applicationName:
          type: string
          maxLength: 200
          description: Page-local applicant name for the EPROC00120 header, sourced from MAIN_BORROWER_NAME.
        checkpoint:
          type: string
          maxLength: 1
          description: Current EPROC00120 checkpoint value for this page. Parent all-tab progress is refreshed by an independent endpoint.
        financialList:
          type: array
          items:
            $ref: '#/components/schemas/FinancialEvaluationFiRow'
      additionalProperties: false
    FinancialEvaluationFiRow:
      type: object
      x-runtime-delta:
        excludedCurrentFields:
          - cetOneCapitalRatio
          - totalCapitalRatio
        disposition: Current DTO/entity maps these to CET_ONE_CAPITAL and TOTAL_CAPITAL, but PRD/db-diff do not confirm them; excluded from this SRS contract until RD/DBA cleanup.
      required:
        - dataSeq
        - ratiosDate
      properties:
        dataSeq:
          type: string
          maxLength: 2
          description: Source/target row key; balance and income DATA_SEQ sets must match exactly before calculation.
        ratiosDate:
          type: string
          maxLength: 10
          description: Page date string; legacy displayed dd/MM/yyyy while DB stores VARCHAR2(10).
        nplRatios:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB NPL.
        loanLossReserves:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LLR.
        loanLossReserveOverNpl:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LLR_OVER_NPL.
        growthOfGrossLoans:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB GGL. First period or previous LOANS_DISCOUNTED denominator zero is N/A; rounding uses HALF_DOWN.
        aggregateLargeExposureRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB AGREE_LARGE_EXPOSURE. Required when isFinish=true.
        creditExposureToSingleBeneficiary:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB CREDIT_EXPOSURE_TO_SB. Required when isFinish=true.
        relatedPartyExposure:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB RELATED_PARTY_EXPOSURE. Required when isFinish=true.
        unhedgedForeignCurrencyRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB UNHEDGED_FOREIGN_CURR. Required when isFinish=true.
        netInterestMargin:
          type: string
          maxLength: 12
          nullable: true
        cost:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB COST_INCOME. Legacy formula; denominator zero is N/A; rounding uses HALF_DOWN.
        roa:
          type: string
          maxLength: 12
          nullable: true
          description: First period, PERIODS=0, or zero average TOTAL_ASSETS denominator is N/A; rounding uses HALF_DOWN.
        roe:
          type: string
          maxLength: 12
          nullable: true
          description: First period, PERIODS=0, or zero average TOTAL_STOCKHOLDER_EQUITY denominator is N/A; rounding uses HALF_DOWN.
        loans:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LOANS_DEPOSITS. Denominator zero is N/A; rounding uses HALF_DOWN.
        liquidityCoverageRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LIQUIDITY_COVERAGE. Required when isFinish=true.
        solvencyRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB SOLVENCY. Required when isFinish=true.
        tier1CapitalRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB TIER_ONE_CAPITAL. Manual field; not Finished-required by this contract.
      additionalProperties: false
    FinancialEvaluationFiFinishedRow:
      type: object
      description: Finished row contract. Automatic formula fields are system-calculated and are not user-required input fields.
      required:
        - dataSeq
        - ratiosDate
        - aggregateLargeExposureRatio
        - creditExposureToSingleBeneficiary
        - relatedPartyExposure
        - unhedgedForeignCurrencyRatio
        - liquidityCoverageRatio
        - solvencyRatio
      properties:
        dataSeq:
          type: string
          maxLength: 2
          description: Source/target row key; balance and income DATA_SEQ sets must match exactly before calculation.
        ratiosDate:
          type: string
          maxLength: 10
          description: Page date string; legacy displayed dd/MM/yyyy while DB stores VARCHAR2(10).
        nplRatios:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB NPL.
        loanLossReserves:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LLR.
        loanLossReserveOverNpl:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LLR_OVER_NPL.
        growthOfGrossLoans:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB GGL. First period or previous LOANS_DISCOUNTED denominator zero is N/A; rounding uses HALF_DOWN.
        aggregateLargeExposureRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB AGREE_LARGE_EXPOSURE. Required when isFinish=true.
        creditExposureToSingleBeneficiary:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB CREDIT_EXPOSURE_TO_SB. Required when isFinish=true.
        relatedPartyExposure:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB RELATED_PARTY_EXPOSURE. Required when isFinish=true.
        unhedgedForeignCurrencyRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB UNHEDGED_FOREIGN_CURR. Required when isFinish=true.
        netInterestMargin:
          type: string
          maxLength: 12
          nullable: true
        cost:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB COST_INCOME. Legacy formula; denominator zero is N/A; rounding uses HALF_DOWN.
        roa:
          type: string
          maxLength: 12
          nullable: true
          description: First period, PERIODS=0, or zero average TOTAL_ASSETS denominator is N/A; rounding uses HALF_DOWN.
        roe:
          type: string
          maxLength: 12
          nullable: true
          description: First period, PERIODS=0, or zero average TOTAL_STOCKHOLDER_EQUITY denominator is N/A; rounding uses HALF_DOWN.
        loans:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LOANS_DEPOSITS. Denominator zero is N/A; rounding uses HALF_DOWN.
        liquidityCoverageRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB LIQUIDITY_COVERAGE. Required when isFinish=true.
        solvencyRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB SOLVENCY. Required when isFinish=true.
        tier1CapitalRatio:
          type: string
          maxLength: 12
          nullable: true
          description: API key for DB TIER_ONE_CAPITAL. Manual field; not Finished-required by this contract.
      additionalProperties: false
    SaveFinancialEvaluationFiResponseEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 64
          description: COMMON_MSG_SAVE_SUCCESS on success; nonzero for business errors.
        message:
          type: string
          maxLength: 200
        data:
          type: object
          nullable: true
          description: Empty page response; parent progress is refreshed via independent parent/checkpoint endpoint.
          additionalProperties: false
      additionalProperties: false
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          maxLength: 64
          description: ACCESS_DENIED / E405 for authorization failures.
        message:
          type: string
          maxLength: 500
      additionalProperties: true

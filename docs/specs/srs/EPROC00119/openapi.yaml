openapi: 3.0.3
info:
  title: EPROC00119 Financial Statement FI API
  version: 1.0.0
  description: >
    C0 Financial Statement FI contract. All business operations use POST RPC
    endpoints. Binary exports use file responses with JSON error envelopes.
servers:
  - url: /
paths:
  /epl-sele-c0-financial-statement-comments:
    post:
      operationId: seleC0FinancialStatementComments
      summary: Load shared C0 financial statement option lists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRequest'
      responses:
        '200':
          description: Option envelope; business errors include E102, FAILED_E116, FAILED_E126, COMMON_MSG_ERROR_LON, MSG_QUERY_FAIL.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/OptionEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-info-c0-financial-statement-cmts-fi:
    post:
      operationId: infoC0FinancialStatementCmtsFi
      summary: Query current Financial Statement FI data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Returns current flat FI data; errors include E102, FAILED_E116, FAILED_E126, COMMON_MSG_ERROR_LON, MSG_DATA_NOT_FOUND, MSG_OVER_COUNT_LIMIT, MSG_QUERY_FAIL.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StatementFiEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-quer-c0-financial-statement-cmts-fi:
    post:
      operationId: querC0FinancialStatementCmtsFi
      summary: Query previous application FI data for copy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceQueryRequest'
      responses:
        '200':
          description: Returns copyable FI data or business messages such as MSG_QUERY_SUCCESS, MSG_ERROR_APPLICATION_NO, MSG_OVER_COUNT_LIMIT, MSG_QUERY_FAIL, COMMOM_MSG_NO_DATA (legacy alias), COMMON_MSG_NO_DATA (to-be canonical spelling).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StatementFiEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-calc-c0-financial-statement-cmts-fi:
    post:
      operationId: calcC0FinancialStatementCmtsFi
      summary: Calculate FI Balance, Income, and Cashflow rows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalcRequest'
      responses:
        '200':
          description: Returns calculated FI lists; business errors include COMMON_MSG_FIELD_CALCULATED, COMMON_MSG_TOTAL_FAIL, COMMON_MSG_ERROR_LON, EPROI0_0160_MSG_ERRO_CURRENCY.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CalcEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-save-c0-financial-statement-cmts-fi:
    post:
      operationId: saveC0FinancialStatementCmtsFi
      summary: Save draft or Finished FI statement data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: Success or business error; codes include COMMON_MSG_SAVE_SUCCESS, COMMON_MSG_SAVE_FAIL, COMMON_MSG_ERROR_LON, MSG_OVER_COUNT_LIMIT, MSG_ERROR_APPLICATION_NO, EPROI0_0160_MSG_ERRO_CURRENCY, E119/FAILED_E119 for first-year zero total assets or total liab/equity, E120/FAILED_E120 for dated Balance rows with difference not equal to zero, and E121/FAILED_E121 for End Balance not equal to Cash and Cash Equivalent.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SaveEnvelope'
                  - $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-pxls-c0-financial-statement-cmts-fi:
    post:
      operationId: pxlsC0FinancialStatementCmtsFi
      summary: Export Financial Statement FI Excel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Excel stream or JSON error; codes include MSG_EXPORT_SUCCESS and COMMON_MSG_PRINT_FAIL.
          content:
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
  /epl-ppdf-c0-financial-statement-cmts-fi:
    post:
      operationId: ppdfC0FinancialStatementCmtsFi
      summary: Export Financial Statement FI PDF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: PDF stream or JSON error; codes include COMMON_MSG_DOWNLOAD_SUCCESS and COMMON_MSG_DOWNLOAD_FAIL.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessErrorEnvelope'
        '401':
          $ref: '#/components/responses/AuthError'
components:
  responses:
    AuthError:
      description: Platform authentication or authorization failure; no mutation or file creation occurs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BusinessErrorEnvelope'
  schemas:
    SelectRequest:
      type: object
      required:
        - applicationNo
        - langType
      properties:
        applicationNo:
          type: string
          maxLength: 30
        langType:
          type: string
          maxLength: 10
    QueryRequest:
      type: object
      required:
        - applicationNo
        - isQuery
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isQuery:
          type: boolean
    ReferenceQueryRequest:
      type: object
      required:
        - applicationNo
        - isQuery
      properties:
        applicationNo:
          type: string
          maxLength: 30
          description: Current DTO field; for the reference-query endpoint this is the reference application's application number.
        isQuery:
          type: boolean
    CalcRequest:
      type: object
      required:
        - applicationNo
        - balanceList
        - incomeList
        - cashflowList
      properties:
        applicationNo:
          type: string
          maxLength: 30
        balanceList:
          type: array
          items:
            $ref: '#/components/schemas/BalanceFiInputRow'
        incomeList:
          type: array
          items:
            $ref: '#/components/schemas/IncomeFiInputRow'
        cashflowList:
          type: array
          items:
            $ref: '#/components/schemas/CashflowFiInputRow'
    SaveRequest:
      type: object
      required:
        - applicationNo
        - isFinish
        - currency
      properties:
        applicationNo:
          type: string
          maxLength: 30
        isFinish:
          type: boolean
        companyName:
          type: string
          maxLength: 200
        currency:
          type: string
          maxLength: 3
        currencyUnit:
          type: string
          maxLength: 2
        balanceList:
          type: array
          items:
            $ref: '#/components/schemas/BalanceFiInputRow'
        incomeList:
          type: array
          items:
            $ref: '#/components/schemas/IncomeFiInputRow'
        cashflowList:
          type: array
          items:
            $ref: '#/components/schemas/CashflowFiInputRow'
        criteria1:
          type: string
          maxLength: 1
          description: Required when isFinish is true.
        criteria2:
          type: string
          maxLength: 1
          description: Required when isFinish is true.
        criteria3:
          type: string
          maxLength: 1
          description: Required when isFinish is true.
        doesNeedAuditedFs:
          type: string
          maxLength: 1
          description: Required when isFinish is true.
        haveProvidedAuditedFs:
          type: string
          maxLength: 1
          description: Required when isFinish is true.
        auditFirm:
          type: string
          maxLength: 50
          description: Required when isFinish is true when audited financial statements apply.
        opinionMemo:
          type: string
          maxLength: 500
          description: Required when isFinish is true when opinion memo applies.
        highlight:
          type: string
          description: Required when isFinish is true.
        loanRepayment:
          type: string
          maxLength: 6000
        finSituation:
          type: string
          maxLength: 6000
        businessRisk:
          type: string
          maxLength: 6000
        borrowerRisk:
          type: string
          maxLength: 6000
        summary:
          type: string
          maxLength: 6000
    ExportRequest:
      type: object
      required:
        - applicationNo
        - langType
      properties:
        applicationNo:
          type: string
          maxLength: 30
        langType:
          type: string
          maxLength: 10
    Decimal15p2:
      type: string
      pattern: '^-?\d{1,15}(\.\d{1,2})?$'
      description: Decimal string with up to 15 integer digits and 2 fractional digits; reject over-precision or over-scale without implicit rounding or truncation.
    Decimal17p2:
      type: string
      pattern: '^-?\d{1,17}(\.\d{1,2})?$'
      description: Decimal string with up to 17 integer digits and 2 fractional digits; reject over-precision or over-scale without implicit rounding or truncation.
    Decimal10p2:
      type: string
      pattern: '^\d{1,8}(\.\d{1,2})?$'
      description: Non-negative Oracle NUMBER(10,2) decimal string; reject over-precision or over-scale without implicit rounding or truncation.
    BalanceFiInputRow:
      type: object
      description: >
        Balance FI request row. `applicationNo` and `dataSeq` are backend-owned.
        Declared total fields use 17+2 precision; all other financial amount
        detail fields are decimal strings with 15+2 precision.
      not:
        anyOf:
          - required:
              - applicationNo
          - required:
              - dataSeq
      properties:
        year:
          type: string
          maxLength: 10
        periods:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
        totalAssets:
          $ref: '#/components/schemas/Decimal17p2'
        totalLiabEquity:
          $ref: '#/components/schemas/Decimal17p2'
        difference:
          $ref: '#/components/schemas/Decimal15p2'
        totalLiabilities:
          $ref: '#/components/schemas/Decimal17p2'
        totalStockholderEquity:
          $ref: '#/components/schemas/Decimal17p2'
        totalEquityAttrOwnerPa:
          $ref: '#/components/schemas/Decimal17p2'
      additionalProperties:
        $ref: '#/components/schemas/Decimal15p2'
    BalanceFiRow:
      type: object
      description: >
        Balance FI response/calc row. `dataSeq` is server-assigned. Declared
        total fields use 17+2 precision; all other financial amount detail
        fields are decimal strings with 15+2 precision.
      properties:
        dataSeq:
          type: integer
          minimum: 1
        year:
          type: string
          maxLength: 10
        periods:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
        totalAssets:
          $ref: '#/components/schemas/Decimal17p2'
        totalLiabEquity:
          $ref: '#/components/schemas/Decimal17p2'
        difference:
          $ref: '#/components/schemas/Decimal15p2'
        totalLiabilities:
          $ref: '#/components/schemas/Decimal17p2'
        totalStockholderEquity:
          $ref: '#/components/schemas/Decimal17p2'
        totalEquityAttrOwnerPa:
          $ref: '#/components/schemas/Decimal17p2'
      additionalProperties:
        $ref: '#/components/schemas/Decimal15p2'
    IncomeFiInputRow:
      type: object
      description: >
        Income FI request row. `applicationNo` and `dataSeq` are backend-owned.
        Financial amount detail fields are decimal strings with 15+2 precision.
      not:
        anyOf:
          - required:
              - applicationNo
          - required:
              - dataSeq
      properties:
        year:
          type: string
          maxLength: 10
        periods:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
      additionalProperties:
        $ref: '#/components/schemas/Decimal15p2'
    IncomeFiRow:
      type: object
      description: >
        Income FI response/calc row. `dataSeq` is server-assigned. Financial
        amount detail fields are decimal strings with 15+2 precision.
      properties:
        dataSeq:
          type: integer
          minimum: 1
        year:
          type: string
          maxLength: 10
        periods:
          type: string
          maxLength: 3
        typeOfYear:
          type: string
          maxLength: 1
      additionalProperties:
        $ref: '#/components/schemas/Decimal15p2'
    CashflowFiInputRow:
      type: object
      description: >
        Cashflow FI request row. `applicationNo` and `dataSeq` are backend-owned.
        `periods` follows the DB NUMBER(10,2) contract; financial amount detail
        fields are decimal strings with 15+2 precision.
      not:
        anyOf:
          - required:
              - applicationNo
          - required:
              - dataSeq
      properties:
        year:
          type: string
          maxLength: 10
        periods:
          $ref: '#/components/schemas/Decimal10p2'
        typeOfYear:
          type: string
          maxLength: 1
        openingBalance:
          allOf:
            - $ref: '#/components/schemas/Decimal15p2'
          description: Required for the first cashflow row unless the backend can read an existing stored opening balance; later rows derive opening balance from the previous row's end balance.
      additionalProperties:
        $ref: '#/components/schemas/Decimal15p2'
    CashflowFiRow:
      type: object
      description: >
        Cashflow FI response/calc row. `dataSeq` is server-assigned. `periods`
        follows the DB NUMBER(10,2) contract; financial amount detail fields are
        decimal strings with 15+2 precision.
      properties:
        dataSeq:
          type: integer
          minimum: 1
        year:
          type: string
          maxLength: 10
        periods:
          $ref: '#/components/schemas/Decimal10p2'
        typeOfYear:
          type: string
          maxLength: 1
      additionalProperties:
        $ref: '#/components/schemas/Decimal15p2'
    OptionEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 64
          description: Supports short platform codes and long message-code keys.
        message:
          type: string
          maxLength: 200
        data:
          type: object
          additionalProperties: true
    StatementFiEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 64
          description: Supports short platform codes and long message-code keys.
        message:
          type: string
          maxLength: 200
        data:
          type: object
          properties:
            haveData:
              type: string
              maxLength: 1
            companyName:
              type: string
              maxLength: 200
            currency:
              type: string
              maxLength: 3
            currencyUnit:
              type: string
              maxLength: 2
            criteria1:
              type: string
              maxLength: 1
            criteria2:
              type: string
              maxLength: 1
            criteria3:
              type: string
              maxLength: 1
            doesNeedAuditedFs:
              type: string
              maxLength: 1
            haveProvidedAuditedFs:
              type: string
              maxLength: 1
            auditFirm:
              type: string
              maxLength: 50
            opinionMemo:
              type: string
              maxLength: 500
            highlight:
              type: string
            balanceList:
              type: array
              items:
                $ref: '#/components/schemas/BalanceFiRow'
            incomeList:
              type: array
              items:
                $ref: '#/components/schemas/IncomeFiRow'
            cashflowList:
              type: array
              items:
                $ref: '#/components/schemas/CashflowFiRow'
            loanRepayment:
              type: string
              maxLength: 6000
            finSituation:
              type: string
              maxLength: 6000
            businessRisk:
              type: string
              maxLength: 6000
            borrowerRisk:
              type: string
              maxLength: 6000
            summary:
              type: string
              maxLength: 6000
            check:
              type: string
              maxLength: 2
    CalcEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: string
          maxLength: 64
          description: Supports short platform codes and long message-code keys.
        message:
          type: string
          maxLength: 200
        data:
          type: object
          properties:
            balanceList:
              type: array
              items:
                $ref: '#/components/schemas/BalanceFiRow'
            incomeList:
              type: array
              items:
                $ref: '#/components/schemas/IncomeFiRow'
            cashflowList:
              type: array
              items:
                $ref: '#/components/schemas/CashflowFiRow'
            resultMsg:
              type: array
              items:
                type: string
    SaveEnvelope:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          maxLength: 64
          description: Supports short platform codes and long message-code keys.
        message:
          type: string
          maxLength: 200
        data:
          type: object
          additionalProperties: true
    BusinessErrorEnvelope:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          maxLength: 64
          description: Supports short platform codes and long message-code keys.
        message:
          type: string
          maxLength: 200
        data:
          nullable: true
